front:
  text: 序余讀仲景之敘醫輒為之掩卷蓋其感生死之芒忽篤君父之危殆賤名利之浮榮冀年壽以沒世傷哉其言焉得不原本藥性加意候診者乎三皇御宇太昊首書八卦開萬世道術之祖而神農遍嘗百味黃帝著為素問迹其鼎足所化醫之用居多今考本經所載草木鳥獸等類則干木果震萑葦坤子母牛兌羊良狗之説酸鹹有五味之別青黃有五色之分則坎水離火震木兌金坤土之説定浮沉明燥濕則本天本地親上親下之説立君臣分佐使則君一民二之説有畏有喜有惡有反則吉凶利害之説有補有瀉有正治有從治則變通趨時之説無非大易之源流八卦之分布聖人所以順風氣而防夭札者端不越此自太史公著扁倉論以為美好者不祥之器而儒者又好自張大置醫於九流之中欲如皇子之論當心東里之辨六氣文摯止疾於齊王枚乘霍然於太子豈可得哉余以少孤不及摻藥以進慈父間為母氏嘗之退而考諸方書多所不合斯用痛心乃於讀書之暇發本經仙經暨十四家本草四子等書靡不悉究然後辨陰陽之所屬五行之所宜著藥性解二卷敢謂拯危濟殆於是焉賴特以志余之悲為人子事親之一助爾且夫甘旨以養之溫清以奉之而卒罹夫不可療之災欲代則不能欲遍訪而證諸人則不及此人子終天之恨仲景氏傷之余所不辭而為之縷析者也若夫素問一書軒岐之精蘊在焉亦欲訂其同異而折衷之期於剖微而止敬以異日公之同好云間李中梓撰
