body:
  text: 卷三草部中玄參味苦鹹性微寒無毒入心肺腎三經主腹中寒熱積聚女子乳癰諸疾補腎氣除心煩明眼目理頭風療咽喉消癭瘤散癰腫解熱毒惡黃耆乾薑大棗山茱萸反藜蘆勿犯銅器餌之噎喉損目按玄參氣輕清而苦故能入心肺以清上焦之火體重濁而咸故能入腎部以滋少陰之火所以積聚等證靡不療之雷公云凡採得須用蒲草重重相隔入甑瞥兩伏時後出曬乾使用時勿令犯銅器餌之墜人喉損人目揀去蒲草用之丹參味苦性微寒無毒入心經養神定志破結除症消癰散腫排膿止痛生肌長肉治風邪留熱眼赤狂悶骨節疼痛四肢不遂破宿血補新血安生胎落死胎理婦人經脈不調血崩帶下按丹參色赤屬火味苦而寒故入手少陽經以療諸般血證苦參味辛性寒無毒入胃大腸肝腎四經主結氣積聚伏熱黃疸腸風燥渴溺有餘瀝逐水消癰明目止淚去濕殺蟲療大風及一切風熱細疹以糯米泔浸一宿去浮面腥氣曬用玄參為使惡貝母漏蘆菟絲子反藜蘆按苦參屬水有火性下降本少少陰心又入手足陽明及足厥陰經者以其善主濕也蓋勝則生熱熱勝則生風而結氣等證從茲有矣今以苦參燥濕治其本也東南卑濕尤為要藥丹溪曰能峻補陰氣或得之而腰重者以其氣降而不升非傷腎也雷公云凡使不計多少先須用糯米濃泔浸一宿上有腥穢氣並在水面上浮去須重重淘過即蒸從巳至申出曝乾細銼用之紅花味辛性溫無毒入心肝二經逐腹中惡血而補血虛除産後敗血而止血暈療跌撲損傷瘡毒腫脹老人血少便結女子經閉不行催生下胎衣及死胎酒漬用其苗生搗敷腫毒其子吞數粒主天行痘瘡不出按紅花下行血海宜入足厥陰而逐血潔古云苦溫為陰中之陽故又入手少陰而補血然長於行血欲其補血須少用或佐補劑三稜味苦性平無毒入肺脾二經主行氣行血多年症癖如石能消為水麵裹煨醋炒用按三稜為血中氣藥脾裹血肺主氣宜併入焉蓋血隨氣上氣聚則血下流故生症癖之患非三稜不治然有斬關之勢虛人忌之蓬莪朮味苦辛性溫無毒入肺脾二經開胃消食破積聚行瘀血療心疼除腹痛利月經主奔豚定霍亂下小兒食積按蓬莪朮與三稜相似故經絡亦同但氣中血藥為少異爾性亦猛厲但能開氣不能益氣虛人禁之乃大便謂氣短不能續者亦宜用之過矣即大小七香丸集香丸都用以理氣豈用以補氣乎欲其行先入血則醋炒欲其先入氣則火炮三稜亦然雷公云凡使於沙盆中用醋磨令盡然後於火畔吸令乾重篩過用之天麻味辛性平無毒入肝膀胱二經療大人風熱眩暈治小兒驚悸風癇祛諸風麻痹不仁主癱瘓語言不遂利腰膝強筋力活血脈通九竅利周身療癰腫濕紙裹煨用無畏忌苗名赤箭主用略同按天麻去風故入厥陰去濕故入膀胱真有風濕功效若神癰腫之證濕生熱也宜亦治之赤箭用苗有自表入里之功天麻用根有自內達外之理不宜同劑反致無功雷公云凡使勿用銜風草緣與天麻相似只是葉莖不同其銜風草根莖瓣葉皆自有青點使銜風草根切勿使天麻二件誤用即令人有腸結之患修事天麻十兩用蒺藜子一鎰緩火熬煎熟後便先安置天麻十兩於甑中只用火熬過蒺藜子蓋內外再用三重紙蓋並擊從巳至未時又出蒺藜子再入熬炒存前天麻瓶內用炒蒺藜子於中依前蓋又隔一伏時取出如此七遍瓶盛出後用布拭上氣汗用刀劈焙之細銼單搗若用銜風草修事法亦同天麻一般南星味苦辛性平有毒入脾肺二經主中風牙關緊閉痰盛麻痹下氣破堅積消癰腫利胸膈散氣墜胎搗敷疥癬瘡毒並蛇蟲咬傷沸水泡七次以牛膽汁收其沫入膽久懸風處更佳畏附子乾薑生薑按肺受風邪脾多痰飲南星專主風痰故併入二經味辛主散所以消癰墜胎及療疥癬等疾大抵與半夏同功但半夏辛而能守南星辛而不守其燥急之性甚於半夏故古方以牛膽苦寒之性制其燥烈且膽又有益肝鎮驚之功小兒尤為要藥丹溪曰南星欲其下行以黃蘗引之秦艽味苦辛性微溫無毒入胃大小腸三經主骨蒸腸風瀉血活筋血利大小便除風濕療黃疸解酒毒去頭風菖蒲為使羅紋者佳按秦艽苦則湧泄為陰故入大小腸以療諸濕辛則發散為陽故入陽明經以療諸風骨蒸之證亦濕勝風淫所致宜並理之雷公云凡使秦艽須於腳紋處認取左紋列為秦治疾右紋列為艽即髮腳氣凡用秦艽以布拭去黃白毛盡然後用還元湯浸一宿日曝乾用之遠志味苦性溫無毒入心腎二經補不足除邪氣益智慧明耳目寧怔忡定驚悸利九竅治健忘壯陽道益精氣長肌肉助筋骨及婦人血禁失音小兒驚風客忤皮膚熱面目黃久服悅顏色延年湯泡去心用得茯苓冬葵子龍骨良畏珍珠藜蘆蜚蠊齊蛤忌諸肉生蔥冷水殺天雄附子毒葉名小草主蘿泄按遠志苦入心經溫能滋腎而不足等證咸本二經故都治之雷公云遠志凡使先須捶去心若不去心服之令人悶去心了用熟甘草湯浸一宿漉出曝乾用之破故紙味苦辛性大溫無毒入腎經主五勞七傷陽虛精滑腰痛膝冷囊濕腎寒酒浸一宿水浸三日蒸用惡甘草忌羊肉羊血蕓薹按破故紙苦能堅腎且性大溫故專走少陰然氣燥不宜多用命門有火及津枯者忌之葫蘆巴味苦性溫無毒入腎膀胱二經得桃仁大茴療膀胱疝氣得硫黃黑附理腎臟虛寒按葫蘆巴雖入腎與膀胱考諸本經無佐使不能獨成功也何首烏味苦甘澀溫無毒十二經絡所不收觀其藤夜交乃補陰之劑也消瘰癧散癰腫療五痔止腸風烏鬚髮美容顏補勞瘦助精神長肌肉堅筋骨添精髓固腰膝除風濕明眼目及治婦人産後帶下諸血老年尤為要藥久服令人多子延年去粗皮酒浸拌黑豆末蒸之水中復加黑豆及酒曬乾九次為度春夏採鮮者赤白合用兼補氣血茯苓為使畏豬羊血無鱗魚蘿蔔忌鐵器按何首烏大能補益全在蒸曬如法大者剖開其中有鳥獸山嶽之形亦神物也傳云五十年如拳大號山奴服之一年髮鬢青黑百年如碗大號山哥服服之一年顏色紅悅一百五十年如盆大號山伯服之一年齒落重生二百年如斗大號山翁服之一年顏如童子行及奔馬三百年如栲栳大號山精服之一年延齡益壽純陽之體久服成仙邇來漸能用之惜末能如法制之耳骨碎補味苦性溫無毒入腎經主折傷補骨碎去毒風疼痛固齒牙療蝕瘡殺諸蟲去毛細銼蜜拌蒸曬乾用按骨碎補溫而下行專入腎家以理骨病齒者骨之餘也故能固之又能殺蟲者蓋以蟲生於濕今能去毒風而蟲之巢穴搗矣豈能生耶雷公云凡使採得後先用銅刀刮去上黃赤毛盡便細切用蜜拌令潤架柳甑蒸一日後出曝乾用又幹寧記云去毛細切後用生蜜拌蒸從巳至亥照前曝乾搗一用炮豬腎空心吃治耳鳴亦能止諸雜痛威靈仙味苦性溫無毒入十二經主諸風宣通五臟去腹內冷滯心胸痰水久積症癖膀胱惡水腰膝冷疼兩足腫滿又療折傷忌面及茶茗牛肉牛乳採時不聞流水聲鐵腳者佳按威靈仙可升可降為陰中之陽故於經絡無所不入丹溪云屬朋故於肝臟多功治痛風之要藥也其性好走多服疏人五臟真氣然風注痛疼非此不除中病即已不宜多用牛膝味苦酸性平無毒入腎經補精氣利腰膝填骨髓除腦漏祛寒濕破血結通月經墜胎孕理膀胱氣化遲難陰中作痛欲死去蘆酒浸一宿用惡龜甲螢火陸英畏白前白蘚皮忌牛肉按丹溪云牛膝引諸藥下行宜入足少陰以理諸疾婦人得之應歸血海故行血有功脾虛氣陷及腿膝腫者不宜用之有二種土牛膝所稟薄故短而細主破血氣川牛膝所稟厚故肥而長主補精髓竹木刺入肉塗之可出雷公云凡使去頭並塵土了用黃精自然汁浸一宿漉出細銼焙乾用黃精味甘性平無毒入脾肺二經補中益氣除風濕安五臟駐顏色久服延年按黃精甘宜入脾潤宜入肺久服方得其益實勝於根花勝於實但難辨爾與鉤吻相似然鉤吻有毛鉤二個誤服殺人雷公云凡使勿用鉤吻真似黃精只是葉有毛子二個是則認處誤服害人黃精葉似竹葉凡採得以溪水洗淨後蒸從巳至午刀薄切曬乾用蒲黃味苦性平無毒入肝經生用則性滑主行血通經墜胎消瘀排膿利小便祛心腹膀胱熱炒用則性澀主止血除崩漏滯下一切吐衄血痢血尿血腸風下血止精泄定兒枕痛忌見鐵器宜隔紙焙黃蒸之再焙用按蒲黃主血而肝藏血故獨入焉仙經用之亦以多功於血耳雷公云凡使勿用松黃並黃蒿其二件全似只是味異凡飲使蒲黃須隔三重紙焙令色黃蒸半日卻焙令乾用之妙續斷味苦辛性溫無毒入肝腎二經主傷寒不足折傷金瘡諸癰腫治漏尿血益氣力續筋骨散諸血暖子宮療腰痛縮小便止夢泄利關節調血和血生肌止痛酒浸一宿焙乾用地黃為使惡雷丸按腎主骨而藏精肝主筋而藏血續斷補精血而理筋骨宜入此二經矣胎産之證尤為要藥雷公云凡使勿用草茆利真似續斷若誤用服之令人筋軟採得後橫切銼之又去向里硬筋了用酒浸一伏時焙乾用益母草味辛甘性微寒無毒入諸陰經主行血養血安胎利産消浮腫惡毒疔瘡治頭風血虛目疾癮疹發癢堪作浴湯子名茺蔚益精明目除水氣療血逆大熱頭痛心煩下腹中死胎理産後血脹按益母本功治血故入諸陰之經行血而不傷新血養血而不滯瘀血所以為胎産聖藥又能消瘡腫者取其行血而且辛甘發散也肉蓯蓉味甘酸鹹性微溫無毒入命門經興陽道益精髓補勞傷強筋骨主男子精泄尿血溺有遺瀝女子症痛崩帶宮寒不孕酒浸一宿去浮甲劈破中心去白膜蒸半日酥炙用潤而肥大者佳按蓯蓉性溫為濁中之濁故入命門而補火惟尺脈弱者宜之相火旺者忌用多服令人大便滑雷公云凡使先須清酒浸一宿至明以板刷去上沙土浮甲盡劈破中心去白膜一重如竹絲草樣是此偏隔人心前氣不散令人上氣不出凡使先用酒浸並刷淨去蒸從午至酉出又用酥炙佳鎖陽味苦鹹性溫無毒入腎經補陰虛固髓潤大便燥結宜酥炙用按鎖陽鹹溫宜入少陰本經不載丹溪續補以其固精故有鎖陽之名主用與蓯蓉相似老人枯閉最為要藥大便不實者忌之車前子味甘性寒無毒入肝膀胱小腸三經主淋瀝癃閉陰莖腫痛濕瘡泄瀉赤白帶濁血閉産難炒細研用常山為使根葉主金瘡功用同子按車前子利水宜入足太陽行血宜入足厥陰然逐水之劑多損於目本草云明目者以其清肝熱如釜底抽薪非因泄水之功也紫菀味苦辛性溫無毒入心肺二經主咳逆上氣痰喘吐衄補虛勞安五臟水洗淨蜜炙用款冬為使惡天雄瞿麥雷丸遠志畏茵陳蒿紫色潤軟者佳按紫菀苦能入心而泄上炎之火辛能入肺而散結滯之氣行氣養血專治血痰為血癆要藥雷公云凡使先去髭有白練色者號曰羊須草自然不同採得後去頭上了用東流水淘洗令淨用蜜浸一宿至明於火上焙乾用凡修治一兩用蜜二分百部味甘苦性微寒有小毒入肺經主肺熱咳逆傳尸骨蒸殺疳疣寸白諸蟲及蝨竹刀劈開去心酒浸用按百部專療咳嗽宜入肺經而小毒故能殺蟲也雷公云凡採得後用竹刀劈破去心皮花作數十於檐下懸令風吹待乾後卻用酒浸一宿漉出焙乾細銼用蔥一顆自有八十三條者焙乾號曰地仙苗若修事餌之壽長百合味甘性平無毒入心肺大小腸四經主鬼魅邪氣熱咳吐血潤肺寧心定驚益志攻發背消癰腫除脹滿利二便按百合性潤故入心肺諸經雖能補益亦傷肺氣不宜多服款冬花味苦辛性溫無毒入心肺二經主中風喉痹肺痿肺癰潤心肺止咳嗽除痰喘定驚洗肝明目杏仁為使得紫菀良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙按款冬辛甘發散為陽故入心肺以理痰嗽等證畏惡甚多用者審之雷公云凡採得須去向外裹花蕊殼並向裡實如粟零殼者並枝葉甘草水浸一宿待搗碎才煎兩件拌了用馬兜鈴味苦性寒無毒入肺經主清肺除咳嗽痰喘治血痔漏瘡根名青木香下毒甚速按馬兜鈴專主手太陰經何以治痔漏之證也良以肺與大腸相為表裡肺遺熱於大腸故有此證令清其表而里病自愈矣雷公云凡使採得後去葉並蔓用生絹袋盛於東屋角畔懸令乾劈開去膈膜取淨子焙用青黛味苦甘性寒無毒入肝脾二經除鬱火解熱毒止下痢殺諸蟲治小兒疳蟲消瘦驚癇邪氣唇焦口渴上膈稠痰療傷寒赤斑面黃鼻赤按青黛色青屬木味甘屬土宜入厥陰太陰以理諸熱之證甘菊味甘微苦性平無毒入肺脾肝腎四經能補陰氣明目聰耳清頭風及胸中煩熱肌膚濕痹枸杞根桑白皮蒼白朮為使按丹溪曰菊花屬金而有土於水大能補陰宜入肺肝等經蓋煩熱諸證皆由水不足而火炎得此補陰則水盛而火自息矣須用味甘者佳若苦者為苦菊大傷胃氣慎之薏苡仁味甘微寒無毒入肺脾肝胃大腸五經利腸胃消水腫祛風濕療腳氣治肺痿健脾胃按薏苡仁總濕熱故入上下五經蓋受熱使人筋攣受濕使人筋緩者可用若受寒使人筋急者忌之勢力和緩須多用見效雷公云凡使勿用粳米棵大無味其粳米時人呼粳粳是也若薏苡仁顆小色青味甘咬著黏人齒用一兩以糯米一兩同熬令糯米熟去米取使若更以鹽湯煎之則是一般修事牡丹皮味辛苦性微溫無毒入肝經治一切冷熱氣血凝滯吐衄血瘀積血跌撲傷血産後惡血通月經除風痹催産難畏菟絲子忌蒜按丹皮主用無非辛溫之功禹錫等言其治冷當矣本草曰性寒不亦誤耶夫肝為血舍丹皮乃血劑固宜入之本功專行血不能補血而東垣以此治無汗骨蒸六味丸及補心丹皆用之蓋以血患火爍則枯患氣鬱則新者不生此劑苦能瀉陰火辛能疏結氣故為血分要藥雷公云凡採後日干用銅刀劈破去骨細銼如大豆許用清酒浸蒸從巳至未出日曬乾用菟絲子味甘辛性平無毒入腎經主男子腎虛精寒腰膝冷痛莖中寒精自出溺有餘瀝鬼交泄精久服強陰堅骨駐顏明目輕身令人多子浸五宿蒸熟杵作餅曬乾研用山藥松脂為使惡藿菌按雷公云菟絲子稟受中和凝正陽氣故宜入補少陰溫而不燥不助相火至和至美之劑宜常用之雷公云凡使勿用天碧草子其樣真相似只是天碧草子味酸澀並黏不入藥用其菟絲子稟中和正陽之氣所結補衛氣助人筋脈採得去粗薄殼用苦酒浸二日漉出用黃精自然汁浸一宿至明微用火煎至干入臼中熱燒鐵杵三千餘成粉並黃精自然汁與菟絲子相對用之茴香味辛甘性溫無毒入心脾膀胱三經主一切臭氣腎臟虛寒癩疝腫痛及蛇傷調中止嘔下氣寬胸又有一種小茴氣味稍薄然治膀胱冷痛疝氣尤奇按茴香氣厚為陽中之陽故入少陰太陰以理虛寒諸證雖辛溫快脾亦能耗氣今內相都入煎爆油膩之物與火無異久則致疾深宜戒之砂仁味辛性溫無毒入脾胃肺大小腸膀胱腎七經主虛寒瀉痢宿食不消腹痛心疼咳嗽腹滿奔豚霍亂轉筋祛冷逐痰安胎止吐下氣化酒食炒去衣研用按砂仁為行散之劑故入脾胃諸經性溫而不傷於熱行氣而不傷於克太陰經要劑也宜常用之白豆蔻味辛性溫無毒入肺脾胃三經主消寒痰下滯氣退目中翳止嘔吐開胃進食除冷瀉痢及腹痛心疼炒去衣研用白而圓滿者佳按白豆蔻辛宜入肺溫為脾胃所喜故併入之大抵辛散之劑不能補益藥性稱其補上焦元氣恐無是理但不甚克削耳世俗不察而信之誤人不小治寒氣神效肺腎中有火及虛者忌之肉豆蔻味苦辛性溫無毒入肺胃二經療心腹脹痛卒成霍亂脾胃寒弱宿食不消虛冷瀉痢小兒傷乳吐瀉尤為要藥糯米粉裹煨忌見鐵器按肉豆蔻即肉果辛溫之性宜入脾胃有未去之積者不可先用雷公云凡使須以糯米作粉使熱湯搜裹豆蔻於糖灰中炮待米糰子焦黃熟然後出去米其中有子取用勿令犯鐵草豆蔻味辛性熱無毒入脾胃二經主風寒客邪在胃其餘與白者同功而性尤燥急不及白蔻有清高之氣按草豆蔻辛溫發散故入脾胃而主風寒多食大損脾胃衍義謂其虛弱不食者宜此恐非胃火者大忌雷公云凡使須去蒂並向裡子後取皮用茱萸同於鍋上緩炒待茱萸微黃黑即去茱萸取草豆蔻皮及子杵用之草果味辛性溫無毒入脾胃二經主瘧疾胸腹結滯嘔吐胃經風邪按草果辛溫發散與草蔻同功故經絡亦同多食亦損脾胃虛弱及胃火者亦忌之菖蒲味辛性溫無毒入心脾膀胱三經主風寒濕痹咳逆上氣鬼疰邪氣通九竅明耳目堅牙齒清聲音益心志除健忘止霍亂開煩悶溫心腹殺諸蟲療惡瘡疥癬勿犯鐵器去根毛用秦皮秦艽為使惡地膽麻黃忌羊肉羊血飴糖生上一寸九節者佳按菖蒲通神明宜入心經祛風濕宜入肺與膀胱功驗雖宏然主散而不主收勿宜久用雷公云凡使勿用泥菖夏菖其二件相似如竹根鞭形黑氣穢味腥不堪用凡使採石上生者根條嫩黃緊硬節稠長一寸有九節者是真也採得後用銅刀刮去黃黑硬節皮一重用嫩桑枝條相拌蒸出曝乾去桑條銼用黑附子味辛甘性大熱有大毒通行諸經主六腑沉寒三陽厥逆症堅積聚寒濕拘攣霍亂轉筋足膝無力墜胎甚速擇每雙重一兩者去皮臍以薑汁鹽水煮數沸又用黃連甘草童便合煮一時於平地上掘坑埋一宿取出囫圇曬乾用地膽為使惡蜈蚣畏人參甘草黃耆防風黑豆按附子為陽中之陽其性浮而不沉其用走而不息故於經絡靡所不入宜致墜胎祛症積等證者辛甘大熱能補命門衰敗之火以生脾土故仲景四逆湯用以回腎氣理中湯用以補脾八味丸用以補腎脾譬如躁悍之將善用之奏功甚捷不善用之為害非輕丹溪以為仲景取其行地黃之滯而不能有補則古方用黑附一味可以回陽不補而能之乎丹溪之言於理未當雖然彼或鑑誤用之弊有激而發爾如法制之毒性盡去且令下行若痼冷陽脫但微炮之天雄性味經絡功用與附子同主療頭面風去來疼痛遠志為使惡腐痹按天雄即附子之長而尖巔頂不正者其氣親上故潔古云主上焦陽虛烏頭性味經絡功用亦同附子主中風惡風洗洗出汗莽草為使惡藜蘆反半夏栝蔞貝母白蘞白芨按烏頭即春間採附子之嫩小者一云原生苗腦烏喙主男子腎濕陰癢癰腫使反性味功用同前按烏喙即烏頭之有兩歧者如烏之口故名側子主發散四肢為風疹藥按側子即附子傍出小顆其氣輕揚故主發散雷公云側子只是附子傍有小顆如棗核者是主用治風疹神妙也木鱉子只是諸喙附雄側烏中有穗者號曰木鱉子不入藥用若服之令人喪目射干味苦性微溫有毒入肺肝脾三經主咳逆上氣咽喉諸證開胃進食鎮肝明目消癰毒逐瘀血通月經行積痰使結核自消又肝經濕氣因疲勞而發便毒者取三寸與生薑同煎服利兩三行效按射干溫能下氣行血宜入肺肝苦能消痰宜入脾經久服令人虛雷公云凡使先以米泔浸一宿漉出然後用堇竹葉煮從未至亥漉出日乾用之旋覆花味鹹甘性溫有小毒入肺肝大腸膀胱四經主結氣風氣脅下滿膈上痰如膠漆利大腸逐水濕按旋覆花專理風氣水濕而肝主風脾主氣膀胱大腸主水濕故均入之丹溪曰走散之藥病人涉虛者不宜多服雷公云凡採得後去里殼蕊皮並蒂子花蕊蒸從巳至午曬乾用大戟味苦甘性大寒有毒入十二經主水脹蠱毒癥結腹滿急痛發汗利大小腸通月經墜胎孕小豆為使惡山藥畏菖蒲反甘草芫花海藻按大戟陰中微陽逐十二經水能損真氣量虛實用之雷公云凡使勿用附生者若服令泄氣不禁即用薺苨子灌解去採得於槐砧上細銼與海羊葉拌蒸從巳至申去羊葉曬乾用之商陸味酸辛性寒有毒入脾膀胱小腸三經主水脹蠱毒疝瘕癰腫惡瘡墜胎孕按商陸專主逐水與大戟相似夫水之為病由於膀胱小腸不利而脾家之所深惡者也故鹹入之有赤白二種白者可服赤者有毒堪用貼腫誤服殺人雷公云凡使勿用赤葛緣相似其赤葛抱莖有消筋骨之毒故勿餌商陸花白年多者仙人採之作脯可下酒也每修事先以鯛刀刮去粗皮小薄切以東流水浸二宿然後漉出架甑蒸以豆葉一重了與商陸一重如斯蒸從午至亥出去豆葉曬乾了細銼用若無豆葉只用豆代之葶藶味辛苦性寒有小毒入肺心脾膀胱四經主水腫結氣膀胱留熱定肺氣之喘促療積飲之痰厥同糯米焙黃去米用榆皮為使惡殭蠶燈草石龍芮按葶藶辛走肺苦走心膀胱者肺所綰也脾土者心所生也故皆入之大傷肺氣滲泄下元用之不當殺人甚捷稍涉虛者忌之有甜苦二種苦者太猛劣甜者性少緩雷公云凡使勿用赤鬚子真相似葶藶只是味微甘苦葶藶子入頂凡使以糯米相合於火上微微焙等米熟去米單搗用牽牛子味苦辛性寒有毒入大小腸二經主下氣通二便祛壅滯氣急退水腫消風毒治腰膝痛墜胎孕酒蒸去皮用按牽牛子專主水氣故入大小腸經丹溪曰屬火善走有兩種黑者兼水白者兼金病形與證俱襯者用之然驅逐致虛不脹滿不大便祕者勿用仲景治七種濕證及小便不利俱不用之何也蓋受濕之根在下焦是血分中氣病皆因上焦虛弱不能氣化所致若復用辛辣之劑以瀉太陰之金危亡立至矣可不謹乎雷公云草金零牽牛子是也凡使其藥秋末即有實冬收之凡用曬乾卻入水中淘浮者去之取沉者曬乾用酒蒸從巳至未曬乾臨用舂去黑皮用萆薢味苦甘性平無毒入脾腎膀胱三經主風寒濕痹腰背痛中風不遂遍身頑麻膀胱宿水陰痿失溺利水道益精明目薏苡為使畏葵根大黃柴胡牡蠣忌牛肉按萆薢之入三經何也蓋腎受土克則水臟既衰肝挾相火而凌土濕脾主肌肉濕鬱肌腠則生熱生風以致營衛不利關節不利而萆薢長於去水用之以滲脾濕則土安其位水不受侮矣然失用令人小便多小便既多則腎氣得復實今多泥其入腎用為補劑亦未深原其理耳木通味辛甘性平無毒入小腸經主五淋小便閉經凝乳閉難産積聚驚悸心煩健忘耳聾聲啞鼻塞癰瘡脾疸喜睡天行瘟疫按木通利便專瀉小腸宜療五淋等證其驚悸等證雖屬心經而心與小腸相為表裡故並治之脾疸喜睡此脾之病皆濕所釀也利小腸而濕不去乎瘟疫之來感天地不正之氣今受盛之官行而邪不能容亦宜療矣通草味淡性寒無毒入肺大小腸三經與木通同功特瀉肺明目退熱行經下乳通結力尤勝之按通草色白宜其瀉肺味淡故入小腸性主通行故又入大腸即本草續注所謂通脫木今女工用以作花
