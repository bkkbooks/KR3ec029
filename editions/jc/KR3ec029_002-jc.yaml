body:
  text: 卷二草部上人參味甘性微溫無毒入肺經補氣活血止渴生津肺寒可服肺熱傷肺去蘆用茯苓為使惡滷咸及藜蘆按參之用臟腑均補何功之宏也蓋人生以氣為樞而肺主氣經所謂相傳之官治節出焉參能補氣故宜入肺肺得其補則治節咸宜氣行而血因以活矣古方用以解散亦血行風自滅之意也至於津液藏於膀胱實上連於肺故有生津液之功肺寒者氣虛血滯故曰可服肺熱者火炎氣逆血脈激行參主上升且能溶血故肺受傷也性本疏通人多泥其作飽不知少服則壅多則反宣通矣雷公云凡使要肥大塊如雞腿並似人形者採得陰乾去四邊蘆頭並黑者銼入藥中夏中少使發心痃之患也黃耆味甘性微溫無毒入肺脾二經內托已潰瘡瘍生肌收口外主表虛盜汗腠理充盈惡龜甲白蘚皮按黃耆之用專能補表肺主皮毛脾主肌肉故均入之已潰瘡瘍及盜汗皆表虛也故咸用之裡虛者忌服恐升氣於表愈致其虛表邪者忌服恐益其邪也惟表虛邪湊不發汗者可酌用之生者亦能瀉火雷公云凡使勿用水耆草真相似只是生時葉短並根黃先須去頭上破皮了蒸半日出後用手擘令細於槐砧上銼用熊氏曰黃耆動三焦之火甘草味甘平無毒入心脾二經生則分身梢而瀉火炙則健脾胃而和中解百毒和諸藥甘能緩急尊稱國老白芷乾漆苦參為使惡遠志反甘遂海藻大戟芫花忌豬肉菘菜按味甘入脾為九土之精安和七十二種金石一千二百種草木有調攝之功故名國老然性緩不可多用一恐甘能作脹一恐藥餌無功惟虛人多熱及諸瘡毒者宜倍用中滿及初痢者忌之所謂脾病人毋多食甘也雷公云凡使須去頭尾尖處其頭尾吐人每斤切長三寸余劈破作六七凡使用器中盛酒浸蒸從巳至午出曝乾細割使一斤用酥七兩塗上炙三盡為度先炮令內外赤黃用良當歸味甘辛性溫無毒入心肝肺三經頭止血而上行身養血而中守梢破血而下流全活血而不走氣血昏亂服之而定各歸所當歸故名酒浸用惡䕡茹畏菖蒲海藻牡蒙按當歸血藥也心主血肝藏血脾裹血故均入之用分為四亦親上親下之道也雷公云凡一齊用不如不使服亦無效未可盡信性泥滯風邪初旺及氣鬱者宜少用之雷公云使先去塵並頭尖硬處一分以來酒浸一宿若要破血即使尾若要止痛止血即用頭硬實處若養血即用中身若全用不如不使服食無效單使妙也川芎味辛甘性溫無毒入肝經上行頭角引清陽之氣而止痛下行血海養新生之血以調經久服令人暴亡白芷為使畏黃連小者名撫芎主開鬱按川芎入肝經能補血矣何云暴亡以其氣升陽其味辛散善提清氣於上部有功然宜中病即已若久用則虛逆且耗故有此患凡氣升痰喘火劇中滿等證不宜用之山藥味甘性溫無毒入脾肺腎三經補陰虛消腫硬健脾氣長肌肉強筋骨療乾咳止遺泄定驚悸除瀉痢乳制用紫芝為使喜門冬惡甘遂按丹溪曰山藥屬土而有金與水宜入脾肺腎而補虛經曰虛之所在邪必湊之腫硬之謂也得補則邪自去脾自健於是土盛生金金盛生水功效相仍矣然單食多食亦能滯氣白朮味苦甘性溫無毒入脾經除濕利水道進食強脾胃佐黃芩以安胎君枳實而消痞止泄瀉定嘔吐有汗則止無汗則發土炒用防風地榆為使忌桃李雀肉青魚菘菜按白朮甘而除濕所以為脾家要藥胎動痞滿吐瀉皆脾弱也用以助脾諸疾自去有汗因脾虛故能止之無汗因土不能生金金受火克皮毛焦熱既得其補脾又藉其甘溫而汗可發矣傷寒門有動氣者不宜用之蒼朮味甘辛性溫無毒入脾胃二經主平胃健脾寬中散結發汗祛濕壓山崗氣散溫瘧泔浸一宿換泔浸炒用使忌同白朮按蒼朮辛甘祛濕脾胃最喜故宜入之大約與白朮同功乃藥性謂其寬中發汗功過於白固矣又謂其補中除濕力不及白於理未然夫除濕之道莫過於發汗安有汗大發而濕未除者也濕去而脾受其益矣若以為發汗故不能補中則古何以稱之為山精煉服可長生也亦以其結陰陽之精氣俗醫泥其燥而不常用不知脾為臟主所喜惟燥未有脾氣健而諸臟猶受其損者獨火炎土燥脾虛作悶者忌之恐益其火也白芍藥味酸苦性微寒有小毒入肝經主怒氣傷肝胸腹中積聚腰臍間瘀血腹痛下痢目疾崩漏調經安胎赤者專主破血利小便除熱明眼目雷丸烏藥沒藥為使惡石斛芒硝畏硝石鱉甲小蘇反藜蘆按白芍酸走肝故能瀉水中之火因怒受傷之證得之皆愈積聚腹痛雖脾之病然往往亢而承製土及似木之象也經曰治病必求於本今治之以肝正其本也目疾與婦人諸證皆血之病得之以伐肝邪則血自生而病自已故四物湯用之亦以婦人多氣也今竟稱其補血之效而忘其用可耶新產後宜酌用之恐酸寒伐生生之氣也血虛者煨用痛痢者炒用雷公云凡採得後於日中曬乾以竹刀刮去粗皮將蜜水拌蒸從巳至未曬乾用之生地黃味甘苦性寒無毒入心肝脾肺四經涼心火之煩熱瀉脾土之濕熱止肺經之衄熱除肝木之血熱忌見鐵器當歸為使得麥門冬酒良惡貝母畏蕪荑萊菔及子按生地黃總是涼血之劑故入四經以清諸熱老人津枯梗結婦人崩漏及產後血攻心者尤為要藥實脾藥中用二三分使脾家永不受邪血虛寒者忌之熟地黃味甘苦性溫無毒入心肝腎三經活血氣封填骨髓滋腎水補益真陰傷寒後脛股疼痛新產後臍腹難禁利耳目烏鬚髮治五勞七傷能安魂定魄使忌畏惡俱同生地性尤泥滯姜酒浸用按熟地黃為補血之劑而心與肝藏血生血者也故能入焉其色黑其性沉陰重濁經曰濁中濁者堅強骨髓腎主骨故入之精血既足則脛股臍腹之證自愈耳目鬚髮必受其益而勞傷驚悸並可痊矣雷公云採得生地黃去白皮磁鍋上柳木甑蒸之攤令氣歇拌酒再蒸又出令乾勿令犯銅鐵令人腎消並白髮男損營女損衛也知母味苦性寒無毒入腎經瀉無根之腎火療有汗之骨蒸止虛勞之陽勝滋化源之陰生勿犯鐵器犯之損腎燒去毛鹽酒炒用按知母入腎為生水之劑水盛則火熄所謂壯水之主以制陽光也口渴乾咳眼花目眩便赤腰痛褥勞煩躁不眠此皆陽盛陰衰之證服之皆愈若肺家寒嗽及腎氣虛脫無火者禁用雷公云凡使先用槐砧上捶銼燒乾木臼中杵搗勿令犯鐵器行經上頸酒炒用貝母味辛苦性微寒無毒入心肺二經清心潤肺止嗽消痰主胸腹氣逆傷寒煩熱淋瀝瘕疝喉痹金瘡人面瘡癭瘤諸惡瘡去心研用厚朴白薇為使惡桃花畏秦艽礬石莽草反烏頭按貝母辛走肺苦走心善能散郁瀉火故治胸腹云云等疾雷公云凡使先於柳木火中炮令黃擘破去肉口鼻上有米許大者心一小顆後拌糯米於鍋上同炒待米黃熟然後去米取出其中有獨顆圍不作兩片無皺者號曰丹龍精不入藥中若誤服令人筋血脈永不收用黃精小鹽汁合服立愈黃芩味苦平性寒無毒入肺大腸膀胱膽四經主崩淋熱疽痛痢惡瘡解毒收口去翳明目調經安胎中枯而飄者瀉肺火消痰利氣除風濕留熱於肌表細實而堅者瀉大腸火養陰退陽滋化源除熱於膀胱山茱萸龍骨為使惡蔥實畏丹砂牡丹藜蘆沙參丹參按芩枯飄者有上升之象故入肺堅實者有下行之理故入大腸諸經性甚寒苟無實火不宜用之黃連味苦性寒無毒入心經主心火炎目疾暴發瘡瘍紅腫腸紅下痢痞滿泄瀉小兒疳熱消口中瘡驚悸煩躁天行熱疾黃芩龍骨連翹滑石為使惡菊花芫花玄參白蘚白殭蠶畏款冬花解巴豆烏頭毒忌豬肉冷水按黃連味苦瀉心治心火諸病不可缺瀉痢雖屬脾經正由火不能生土況心與小腸相為表裡心火瀉則小便亦利而腸胃自厚矣因寒得瀉者忌之又久病氣虛心火不盛者用之則愈虛虛火反熾雷公云凡使以布拭去髭毛然後用漿水浸二伏時漉出於柳木火中焙乾用若服此藥得十兩不得食豬肉若服至三年一生不得食豬肉也大黃味苦性大寒無毒入脾胃大腸心肝五經性沉而不浮用走而不守奪土鬱而無壅滯定禍亂而致太平名曰將軍又主癰腫及目疾痢疾暴發血關火閉推陳致新黃芩為使無所畏錦紋者佳按大黃之入脾胃大腸人所解也其入心與肝也人多不究昔仲景百勞丸庶蟲丸都用大黃以理勞傷吐衄意最深微蓋以濁陰不降則清陽不升者天地之道也瘀血不去則新血不生者人身之道也蒸熱日久瘀血停於經絡必得大黃以豁之則肝脾通暢陳推而致新矣今之治勞多用滋陰頻服不效坐而待斃嗟乎術豈止此耶至癰腫目疾及痢疾咸熱瘀所致故並治之傷寒脈弱及風寒未解者禁用雷公云凡使細切內紋如水旋斑緊重銼蒸從巳至未曬乾又漉臘水蒸從未至亥如此蒸七度曬乾卻漉薄蜜水再蒸一伏時其大黃醬如烏膏樣子日曬乾用之為妙桔梗味辛性微溫有小毒入肺經主肺熱氣奔痰嗽鼻塞清喉利膈能載諸藥入肺節皮為使畏白芨龍眼龍膽草按桔梗味辛故專療肺疾下部藥中勿用恐其上載而不能下達也雷公云凡使勿用本梗真似桔梗咬之只是腥澀不堪用凡使去頭尖硬二三分以來並兩畔附枝子於槐砧上細銼用百合水浸一伏時漉出緩火熬令乾用每修事四兩用生百合五分搗作膏投水中浸天花粉味苦性寒無毒入肺心脾胃小腸五經主肺火盛而喉痹脾胃火勝而口齒腫痛清心利小便消痰除咳嗽排膿消腫生肌長肉止渴退煩熱補虛通月經枸杞為使惡乾薑畏牛膝乾漆反烏頭按天花粉色白入肺味苦入心脾胃者心之子肺之母也小腸與心相為表裡故均入焉本功清熱故主療頗多其理易達惟曰補虛通經此甚不可泥也夫苦寒之劑豈能大補以其能清火則陰得其養非真補也月水不通亦以熱閉熱退則血盛經通非真能通也此治本窮源之說耳倘因寒致疾者可誤使哉子名栝蔞主胸痹仁主潤肺下氣止痰嗽瘵乳癰乳閉並宜炒用半夏味辛平性生寒熟溫有毒入肺脾胃三經下氣止嘔吐閉郁散表邪除濕化痰涎大和脾胃須湯淋十遍姜礬甘草制用射干柴胡為使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭忌羊肉羊血飴糖海藻按半夏味辛入肺性燥入脾胃中其毒者口噤發吐煩渴及血證勿用惟氣證發渴者不禁雷公云凡使勿用白傍几子真似半夏只是咬著誤微酸不入藥用若修事半夏四兩用搗了白芥子末二兩頭醋六兩二味攪令濁將半夏投中洗三遍用之半夏上有陳涎若洗不淨令人氣逆肝氣怒滿紫蘇味甘辛性溫無毒入肺脾二經葉能發汗散表溫胃和中除頭痛肢節痛雙面紫者佳不敢用麻黃者以此代之梗能順氣安胎子能開鬱下氣定喘消痰按辛走肺甘走脾辛散之劑下氣最捷所虛者少用之白芷味辛性溫無毒入肺脾胃三經去頭面皮膚之風除肌肉燥癢之痹止陽明頭痛之邪為肺部引經之劑主排膿托瘡生肌長肉通經利竅止漏除崩明目散風驅寒燥濕當歸為使惡旋覆花按白芷味辛為肺所喜而溫燥為脾胃所喜宜其入矣然香燥而發散主治雖多能傷氣血不宜多用雷公云凡採得後勿用四條低處生者此名張公藤兼勿用馬藺並不入藥中採得後刮削去皮細銼用黃精亦細銼以竹刀切二味等分同蒸一伏時候出於日曬乾去黃精用之防風味辛甘性溫無毒入肺經瀉肺金療諸風開結氣理目痛惡乾薑藜蘆白蘞芫花解附子毒按防風辛走肺為升陽之劑故通療諸風氣之結者肺之疾也目之痛者風之患也宜並主之東垣云卑賤之卒聽令而行隨所引而至乃風藥中潤劑也能瀉上焦元氣虛者不概用今人類犯此弊獨活味苦甘辛性微溫無毒入肺腎二經主新舊諸風濕痹頸項難伸腰背痠疼四肢攣痿黃色而作塊者為獨活按獨活氣濁屬陰善行血分斂而能舒沉而能升緩而善搜可助表虛故入太陰肺少陰腎以理伏風羌活味苦甘平性微溫無毒入小腸膀胱二經散入表風邪利周身即痛排巨陽腐肉之疽除新舊風濕之證紫色而節密者為羌活按羌活氣清屬陽善行氣分舒而不斂升而能沉雄而善散可發表邪故入手太陽小腸足太陽膀胱以理遊風其功用與獨活雖若不同實互相表裡用者審之雷公云採得後細銼拌淫羊藿蒸二日後曝乾去淫羊藿用免煩人心柴胡味苦性微寒無毒入肝膽心胞絡三焦胃大腸六經主傷寒心中煩熱痰實腸胃中結氣積聚寒熱邪氣兩脅下痛疏通肝木推陳致新半夏為使惡皂莢畏女菀藜蘆犯火無效按柴胡氣味升陽能提下元清氣上行以瀉三焦火補中益氣湯用之亦以其能提肝氣之陷者由左而升也凡胸腹腸胃之病因熱所致者得柴胡引清去濁而病謝矣故入肝膽等經衍義曰本經並無一字言及治勞今治勞多用之誤人不小勞有一種真臟虛損復受邪熱邪因虛而致勞者宜用後世得此數言凡遇勞證概不敢用此所謂侏儒觀場隨眾喧喝矣惟勞證不犯實熱者用之亦能殺人誠所當慎咳嗽氣急痰喘嘔逆者禁用以其上升也傷寒初起忌之恐引邪入少陽經也雷公云凡使莖長軟皮赤黃髭鬚出在平川平縣即今銀州銀縣也西畔生處多有白鶴綠鶴於此翔處是柴胡香直上云間若有過往聞者皆氣爽凡採得後去髭並頭用銀刀削去赤薄皮少許卻以粗布拭淨細銼用之勿令犯火立便無效也注云柴胡乃少陽經藥也久服令人肝膽平前胡味苦甘辛性微無毒入肺肝脾膀胱四經主傷寒痰嗽痞滿心腹結氣解熱開胃推陳致新亦止夜啼兒佐使畏惡同柴胡按前胡辛可暢肺以解風寒甘可悅脾以理胸腹苦能泄厥陰之火溫能散太陽之邪雷公云凡使勿用野蒿根緣真似前胡只是味粗酸若誤用令人反胃不受食若是前胡味甘氣香凡修事先用刀刮去蒼黑皮並髭細銼用甜水浸令潤於日中曬乾用之香附味辛甘性溫無毒入肺肝脾胃四經疏氣開鬱消風除癢便醋製用按香附味甘辛故主發散疏通以入肺肝脾胃類稱女科聖藥者蓋以婦人心性偏熱多氣多郁血因氣鬱則不能生耳不知惟氣實血不大虛者宜之不然損其氣燥其血愈致其疾惜乎未有發明而俗多受女科聖藥一句之累矣性燥故便制以潤之性散故醋製以斂之麻黃味甘苦性溫無毒入肺心大腸膀胱四經主散在表寒邪通九竅開毛孔破癥結除積聚去根節者大能發汗根節能斂汗厚朴為使惡辛夷石葦陳久者良按麻黃端主發散宜入肺部出汗開氣宜入心與大腸膀胱此驍悍之劑也可治冬月春間傷寒瘟疫夏季不可輕用惟在表真有寒邪者可用或無寒邪或寒邪在裡或裡虛之人或陰虛發熱或傷風有汗或傷食等證雖發熱惡寒其不頭疼而拘急六脈不浮緊者皆不可用雖可汗之證不宜多服蓋汗乃心之液若不可汗而汗與可汗而過汗則心血為之動矣或至亡陽或至衄血不止而成大患丹溪以麻黃人參同用亦攻補之法也醫者宜知之雷公云凡使去節並沫若不盡服之令人悶用銅刀剪去節並頭槐砧上用銅刀細銼煎三四十沸竹片掠去上沫盡漉出熬乾用葛根味甘性平無毒入胃大腸二經發傷寒之表邪止胃虛之消渴解中酒之奇毒治往來之溫瘧解野葛巴豆丹石百藥毒按葛根療熱解表故入手足陽明太陽初病未入陽明而頭痛者不可便服以發之恐引賊入家也又表虛多汗者禁用麥門冬味甘性平微寒無毒入肺心二經退肺中隱伏之火生肺中不足之金止消渴陰得其養補虛勞熱不能侵去心用地黃車前為使惡款冬苦瓠畏苦參青蓑忌卿魚肥大者佳按麥門冬陽中微陰夫陽乃肺藥微陰則去肺中伏火伏火去則肺金安而能生水水盛則能清心而安神矣故能治血妄行調經和脈天門冬味苦甘性寒無毒入肺腎二經保肺氣不被熱擾定喘促故得康寧止消渴利小便強骨髓悅顏色殺三蟲去伏屍去心用地黃貝母垣衣為使畏曾青忌鯉魚按天門冬氣薄主升故入肺味厚為陰故入腎虛熱者宜之虛寒者禁用雷公云採得了去上皮一重便劈破去心用柳木甑燒柳木柴蒸一伏時酒灑令遍更添火蒸出曝去地二尺以來作小架上鋪天門葉將蒸了天門冬攤令乾用五味子味皮肉甘酸核中苦辛且都有鹹味五味俱備故名性溫無毒入肺腎二經滋腎經不足之水收肺氣耗散之金除煩熱生津止渴補虛勞益氣強陰蓯蓉為使惡葳蕤勝烏頭北產者良按五味屬水而有木火土金故雖入肺腎而五臟咸補乃生津之要藥收斂之妙劑然多食反致虛熱蓋以收補之驟也如火嗽輒用寒涼恐致相激須用此酸斂以降之亦宜少用肺火鬱及寒邪初起者禁用小兒尤甚以酸能鉤痰引嗽也雷公云凡小顆皮皺泡者有白撲鹽霜一重其味酸鹹苦辛甘味全者真也凡用以銅刀劈作兩片用蜜浸蒸從巳至申卻以漿水浸一宿焙乾用之升麻味甘苦性微寒無毒入大腸脾胃肺四經引蔥白散手陽明之風邪引石膏止陽明之齒痛引諸藥遊行四經升陽氣於至陰之下故名升麻又主解百毒殺精物闢瘟疫除蠱毒止瀉痢白芷為使形輕而堅實青綠色者佳按升麻提氣解肌故入此四經然奉令之使不能益人若下元不足者用此升之則下虛而元氣益虧矣藥性乃曰元氣不足者用此於陰中升陽恐非惟陽氣有餘而下陷者宜之若初病太陽證便服升麻以發陽汗是引賊入門亦非所宜也雷公云採得後用刀刮去粗皮一重用黃精自然汁浸一宿漉出曝乾細銼蒸了曝乾後用之佳藁本味苦辛性微溫無毒入小腸膀胱二經主寒氣客於巨陽之經若頭痛流於顛頂之上又主婦人疝瘕陰中寒腫痛腹中急疼惡䕡茹畏青葙子按藁本上行治風故理太陽頭痛下行治濕故婦人諸證風濕俱治功用雖匹尤長於風耳細辛味辛溫無毒入心肝膽脾四經止少陰合病之茴痛散三陽數變之風邪主肢節拘攣風寒濕痹溫中氣散死肌破結氣消痰嗽止目淚療牙疼治口臭利水道除喉痹通血閉獨活曾青棗根為使惡狼毒山茱萸黃耆畏硝石滑石反藜蘆忌生菜貍肉華陰者良按細辛辛溫宜入心肝等經以療在裡之風邪其氣升陽故上部多功然諸證犯寒者可用若因火熱屬陽證者忌之單服末不可過半錢多則氣塞不通者死雷公云凡使一葉揀雙葉服之害人須去頭上田瓜水浸一宿至明漉出曬乾用連翹味苦性微寒無毒入心肝膽胃三焦大腸六經瀉六經之血熱散諸腫之瘡瘍利小腸殺白蟲通月經療五淋破癭瘤解痘毒鼠黏子為使按連翹苦寒雖瀉六經而心經為最諸瘡淋閉等證俱屬心火故能療之藥性曰除六經熱與柴胡同功然此治血熱柴胡治氣熱之別耳澤瀉味甘鹹性寒無毒入膀胱腎三焦小腸四經主去胞垢退陰汗治小便淋澀仙藥療水病濕腫靈丹畏海蛤文蛤色白者佳按澤瀉下降為陰專主滲泄宜入膀胱諸經其行水之功過於豬苓衍義曰小便既多腎氣焉得復實扁鵲曰多服病人眼藥性曰令人面光無子乃本草稱其補虛明目治泄精消渴珍囊注其生新水止虛煩恐無是理即六味丸中用之以其滲去脾濕退命門火為嚮導爾又藥性賦云補陰不足蓋以補陰之功不足也後世不察謂其可以補陰分之不足大失本旨扁鵲云多服病人眼一名水瀉一名及瀉一名芒芋一名鵠瀉生汝南汝澤五月八月採根陰乾實味甘無毒主風痹消渴益腎氣強陰補不足除邪濕久服面生光令人無子九月採雷公云不拘多少細銼酒浸一宿漉出曝乾任用也葉味鹹無毒主大風乳汁不出產難強陰氣五月採玄胡索味苦辛性溫無毒入心肺脾胃四經活精血療產後之疾調月水主胎前之證一切因血作痛之證並治酒炒行血醋炒止血生用破血炒用調血按玄胡索可升可降為陰中之陽故能行上下四經此理血之劑也苟非血證用之無益地榆味苦甘酸性微寒無毒入大腸肝二經主下部積熱之血痢止下焦不禁之月經又主金瘡除惡肉崩中帶下得發良惡麥門冬按地榆沉寒屬陰專入肝腸以理下焦血證有熱者宜之若虛寒下陷血衰泄瀉者勿用防己味辛苦性平溫無毒入十二經尤善腰以下至足濕熱腫盛療中風手腳攣急口眼喎斜疥癬蟲瘡止嗽消痰利大小便去留熱垣衣為使惡細辛萆薢殺雄黃毒按防己為陽中之陰於經絡無所不入又主降故下部多功象之於人則險而健者也用之當則可展其能一不當而反階之禍惟十二經真有濕熱壅塞及膀胱積熱下疰腳氣此誠要藥無可代者然臭味拂人妄服之令人減食其不可用有四若飲食勞倦元氣既虧而以防己泄大便則重亡其血一也發渴引飲熱在肺經氣分防己乃下焦血藥二也外傷風寒邪傳肺部以至小便黃赤不通此上焦氣分禁忌血藥三也久病之後津液不行此上焦虛渴宜補宜甘溫若用苦寒之劑則速其危四也分木漢二種即根苗為名漢主水氣木主風氣為少異耳雷公云凡使勿使水條以其水防己黃腥皮皺上有了足子不堪用夫使防己要心花大黃色者佳車前草根相對同蒸半日後出曬車前草去之細銼用常山味苦辛性微寒有毒入肝經最開結痰專理瘧疾毒令人吐惡生蔥菘菜及醋苗名蜀漆雞骨者良按丹溪云常山屬金宜伐肝邪然其性酷下咽令人大吐傷脾損胃惟精壯與痰實者宜之老人小兒及虛弱久病勿用雷公云凡使春使莖葉夏秋冬用根用酒浸一宿至明漉出日乾熬搗炒用勿令老人久病服之大忌草龍膽味苦澀性寒無毒入肝膽腎膀胱四經退肝經之邪熱除下焦之濕腫明目定驚治疸止痢能殺疳蟲小豆貫眾為使惡防葵地黃按圖經龍膽秋令開花冬間結實屬金與水金能制木水入腎家膽與膀胱乃肝腎同部之腑也故均入焉夫目得肝血而能視肝得腎水而後生今益腎清肝目之受明所自來矣驚疳疸痢皆肝膽證也何弗治耶雷公云採得後陰乾欲出時用銅刀切去髭上頭丁於甘草湯中浸一宿至明漉出曝乾用勿空腹食之令人溺不禁
