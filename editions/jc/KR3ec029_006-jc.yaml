body:
  text: 卷六菜部生薑味辛性溫無毒入肺心脾胃四經主通神明去穢惡散風寒止嘔吐除泄瀉散鬱結暢脾胃療痰嗽製半夏和藥要熱去皮要冷留皮惡黃芩按生薑辛入肺肺得所勝則氣通宣暢主宰精靈故能通神明神明通則一身之氣皆為我使而亦勝矣一身之氣勝則中焦之元氣定而脾胃出納之令行邪氣不能容矣故能去穢惡經云秋不食姜者蓋以燥金主令天道斂收姜則味辛善散肺氣人肖天地以生未有干天地之和而猶受其益者諺所謂夜不食姜亦以夜氣斂而姜性散耳如療病則不可泥也宜常用而不宜多用乾薑味辛性大熱有毒入肺大腸脾胃腎五經生者味辛能行血逐寒邪而發表熟者味苦能止血除胃冷而守中沉寒痼冷腎中無陽脈氣欲絕者用黑附為引按乾薑之辛本職肺家其以性熱故又入脾胃大腸至於少陰之入黑附為之引耳夫血遇熱則走生者行之固其宜也而吐衄下血崩漏淋產證熟者反能止之何也蓋物極則反血去多而陰不復則陽無所附得此以助陽之生而陰復矣曰見火則味苦色黑守而不走血安得不止耶然必病久氣虛亡陽而多盜汗及手足冷者宜用若初病火熾遽爾投之是抱薪救火危亡立至矣可不謹乎丹溪曰乾薑散肺氣同五味能止嗽治血虛發熱該與補陰藥同用入肺中利肺氣入腎中燥下濕入氣分引血藥入血也東垣云多用能耗元氣壯火食氣故也乾薑辛熱皆言補脾海藏獨言泄脾何也泄之一字非泄脾之正氣是泄脾中寒濕之邪蓋以辛熱之劑燥之故曰泄脾也生者能墮胎萊菔味辛甘性溫無毒入肺脾二經主下氣消食除痰止嗽解渴化癖搗汁磨墨堪止吐血熟者補脾其子下氣猶捷有推牆倒壁之功水研可吐風痰醋研可敷惡毒俗名蘿蔔解面毒按萊菔辛宣肺部甘走脾家故兩入之生者下氣多食耗血以辛多於甘也熟者補脾多食滯氣以甘多於辛也其子力倍虛者戒之白芥子味辛性溫無毒入肺胃二經主下氣止翻胃消瘧癖闢鬼邪驅疰氣除皮裡膜外痰涎醋研可敷射工毒其莖葉堪卻冷氣能安五臟按白芥子辛宜於肺溫宜於胃故俱入之氣虛及肺胃中有火者咸禁食之韭味辛性溫無毒入肺脾腎三經主下氣和中補腎益陽利腰膝和臟腑除胸腹痃癖痼冷止白濁遺精其根搗汁下膈中瘀血殊效其子較根葉猶勝忌糖蜜及牛肉按丹溪云韭屬金而有土與水宜入肺脾腎以主三經之證然不宜多食令人神昏目暗蒜味辛性大溫有小毒入脾胃二經主溫中消食止霍亂轉筋除吐瀉及中脘冷痛瘟疫瘴癘蠱毒疔腫邪痹毒氣按蒜味辛溫故入脾胃以理諸證丹溪云性熱快膈人皆喜食多用則傷脾損肺壞肝昏目生痰發嗽而無顏色化肉之功不足多也有志頤生者宜知自警胡荽味辛性溫微毒入肺脾二經主通小腹氣除四肢熱止頭痛消穀食散痧疹齊痘瘡其子煎油可敷禿瘡忌斜蒿同食令人汗死按胡荽味辛肺所藥也性溫脾所快也故皆入之肺主皮毛脾主肌肉所以理痧痘等證多食損精神發痼疾令人健忘腳氣狐臭者食之愈甚蔥白味辛性溫無毒入肺胃肝三經善發汗通骨節逐肝邪明眼目去喉痹愈金瘡安胎氣止鼻衄治霍亂轉筋理傷寒頭痛殺魚肉毒通大小腸散面目浮腫止心腹急疼腳氣奔豚氣連須搗可除蛇傷蚯蚓傷畏蜜菘菜常山同食殺人按皮毛腠理肺所司也風淫水旺肝所患也邪傳入里胃所疾也蔥白功專發散又主通中三經之入有由來矣多食則伐氣昏神虛者戒之冬葵子味甘性寒無毒入小腸膀胱二經主滑胎產利小便療熱淋逆生者得之即順胎死者得之即下能通乳汁堪潰癰疽按冬葵子性最滑利能宣積壅宜入手足太陽以為催生之劑然不可預服恐胞未轉而先催空涸其水反艱其產耳癰疽者營氣不從逆於肉理乳閉者亦凝滯之所致也得冬葵以導之而不瘳者鮮矣白冬瓜味甘性微寒無毒入脾胃大小腸四經主胸前煩悶作渴臍下水脹成淋通大小便大解熱毒可貼癰疽又解丹石毒及魚毒按冬瓜味甘宜入脾胃性走而急宜入大小腸煩渴癰疽皆熱也其性寒故能解之丹溪曰久病與陰虛者忌服未被霜而食之令人成反胃病人部乳汁味甘性平無毒入心肝脾三經主健四肢榮五臟實腠理悅皮膚安神魂利關格明眼目久服延年按乳汁本血也心主血肝藏血脾裹血宜併入之夫婦人之血降為月水升為乳汁房術云女子一身屬陰惟月水屬陽故名水中金惜神農本經不載而諸家本草遂以為血屬於陰其性大冷不知月水乳汁本同一物月水之熱人咸知也今升而為乳質較輕清中和補益實為過之何反以為大冷耶若果大冷則必能傷脾小兒食之當泄利不止矣有是理哉特不宜與食混進誠能令人瀉耳金汁味甘苦性大寒無毒入心經主天行狂熱陰虛燥熱解一切毒療一切瘡埋土年久者佳按素問曰濁陰出下竅宜其足以制陽亢而心則火之主也故獨入之造法於冬月取竹籮置缸上棕皮鋪滿加草紙數層屎澆於上汁淋在缸新甕盛貯磁缽蓋之鹽泥封固埋地年深自如清泉聞無穢氣又法臘月取淡竹刮去青皮浸廁中取汁亦佳屎蛆味甘鹹性平無毒入脾經主小兒疳積脹滿須水中漂淨貯於桶中剖蝦蟆飼肥烈日曝蒸蓋密即死文火烘燥用按蛆本濁陰下降流動不拘之物有行下之理故專入脾經以療兒疳最效人溺味鹹性寒無毒入心肺二經主勞熱吐衄痰喘咳嗽撲傷瘀血產後敗血生津解渴能通二便童男者猶勝積垢在器即名人中白瓦上文火煅之存性酒醋兼制與溺同功療口瘡痰結須露天經年者佳按人溺降火最速丹溪曰氣有餘便是火肺主氣心屬火宜均入之降火而不傷於寒涼且補益之功甚大而本草不言惜哉褚澄云以童便治血證百不一死庶得其用矣秋石味鹹性微寒無毒入肺腎二經主滋腎水返本還元養丹田歸根覆命安和五臟潤澤三焦消咳逆稠痰退骨蒸勞熱能除鼓脹亦軟堅積明目清心延年益壽按秋石之咸本專入腎而肺即其母也故併入之須用陰陽煉者兼而服之得坎離既濟之義東坡有煉法可用月水性味經絡諸書不載主男子羸中傷幾死解藥箭毒首經者猶屬純陽能回生再造按月水之補實令人有起死之功今時罕有能用之者惜哉發味苦性微溫無毒入心經主咳嗽五淋二便不通燒灰吹鼻立止衄血亦主小兒驚癇胎髮及童男女剃下者尤佳多產婦人發燒灰酒服極善催生按發為血之餘而心則主血者也故獨入之丹溪稱其補陰甚捷良有故耳雷公云凡使須用男子二十以來無疾患顏貌紅白於頂心剪下者佳凡於丸散膏中先用苦參水浸一宿漉出入瓶以火燒之令通赤放冷研用之紫河車味甘性大溫無毒入心脾腎三經主諸虛百損五勞七傷骨蒸潮熱體弱氣短吐衄男子精衰婦人無孕的是仙丹取肥壯者洗淨抽去紫筋切碎入童便二碗入鉛瓶重湯煮爛一晝夜方開杵成膏用世俗有埋地日久化作清泉者此名河車水主天行時疫熱狂小兒丹疹熱毒按紫河車味甘宜其歸脾父之精也宜歸腎臟母之血也宜入心家夫其精血所結未有男女先立胚胎渾然太虛實乾坤之橐龠鉛汞之根基九九數足兒則載而乘之故名河車又曰紫者以紅黑色相雜也合坎離之色得妙合之精雖成後天之形實稟先天之氣補益之功更無足與儔者第其性溫若有火證者必得便制斯無他患耳天靈蓋味鹹性平無毒所入經絡諸書不載主傳屍鬼疰並療大傷取得後用糖灰火罨一夜待腥穢氣出盡後用童便於磁鍋內煮一伏時埋於地下可深一尺亦一伏時取出聽用陽人使陰陰人使陽按天靈蓋即頂蓋骨也神農本經不載後世醫家始用之此本同類之物見則當憐而悲之乃取而食之殊非仁人之用心世稱孫思邈有大功於世以殺命治命尚有陰貴況於是乎若必不得已而用之當取年深漬汙者良以其絕屍氣也死人枕味鹹性平無毒所入經絡諸書不載主傳屍鬼疰邪氣石蛔取之煎湯用用畢送還原處按死人枕即腦後骨也夫鬼邪乘人非藥石可攻用死人枕者所謂引之以類也石蛔者久蛔也醫療既癖蛔蟲轉堅藥劑不能療所以需鬼物驅之用畢即送還原處者一則使邪疰之氣有所依歸一則勿以療人而傷鬼也古有神醫徐嗣伯劉大用者用之輒驗禽獸部黑嘴白鴨味甘性微寒無毒入肺腎二經主大補虛勞最消毒熱利小便除水腫消脹滿利臟腑退瘡腫定驚癇綠頭者亦堪用白目者能殺人忌龜鱉肉按肺之色屬白腎之色屬黑黑嘴白鴨宜其入此二經肺腎受補誠為勞證仙方得童便煮服功效不可盡述烏骨毛雞味甘性微溫有小毒入五臟諸經主虛羸折傷癰疽及心腹惡氣亦能安胎過食生火動風按丹溪曰雞屬土而有金與木火則所稟者惟少水爾今得其毛骨之黑是五行具備故於五臟靡弗也於卦為巽巽為木故能生火又為風故能動風日華子以為除風濕麻痹於理未合雄雀味甘鹹性熱無毒入命門經主益氣壯陽其腦主耳聾及凍瘡頭血主點雀盲糞名白丁香主㿗癰癤點目內胬肉血膜除癥瘕伏梁爛痃癖積塊按雀之咸熱宜入命門而補火然相火久炙其水必衰勿宜過服致傷腎臟妊娠猶忌食之腦血及白丁香之功咸性熱所致爾雀卵味酸溫無毒主下氣男子陰痿不起強之令熱多精有子腦主耳聾頭血主雀盲雄雀屎齒痛用藥療目痛治癰癤女子帶下溺不利除疝瘕五月取之良注云兩頭尖者是雄雀屎雷公云雀蘇凡使勿用雀兒糞其雀兒口黃未經淫者糞連蘇若底坐尖在上即曰雌兩頭圓者是陰人使雄陽人使雌凡採之先去兩畔有附子生者通用然後於缽中研如粉煎甘草湯浸一宿去上清甘草水盡焙乾任用伏翼味鹹性微熱有毒不載經絡主逐五淋利水道去翳明目令人喜樂媚好忘憂久服延年屎名夜明砂破腹中血氣及寒熱積聚除驚悸血堪點眼形重一斤色白如雪者佳按伏翼原名蝙蝠以其晝伏夜飛因稱伏翼能伏氣冬月不食故多壽人服之宜其有延年之功矣雷公云凡使要重一斤者方採之每修事先拭去肉上皮毛爪腸留翅並肉腳及嘴然後酒浸一宿漉出取黃精自然汁塗之炙令乾方用每修事重一斤一個用黃精自然汁五兩為度龍骨味甘性平無毒入腎經主丈夫精滑遺泄婦人崩中帶下止腸風下血療瀉痢不止得五色具者佳其齒主驚癇狂疾俱畏乾漆蜀椒理石石膏按經曰腎主骨宜龍骨獨入之觀其沾舌大抵嗇之用居多故主精滑等症經曰澀可去脫是之謂耶虎骨味辛性微熱無毒入腎經主邪氣鬼疰筋骨毒風攣急酥炙用畏乾漆蜀椒磁石按虎骨入腎亦以腎主骨故也其治骨間毒風者何也易曰風從虎夫風木也虎金也木受金制焉得不從雷公云虎睛凡使須問獵人其眼有雌有雄有老有嫩有殺得者惟中有毒箭死者勿使能傷人凡用虎睛先於草羊血中浸一宿漉出微微火上焙乾搗成粉候眾藥出取合用之也犀角味苦酸鹹性寒無毒入心肝二經主百毒蠱疰鬼魅邪氣傷寒瘟疫煩躁癲狂痘疹血熱癰疽腫毒清心鎮肝明目定驚孕婦忌服須紋細色烏光明滑潤者佳取其茸尖功力具備松脂為使惡雷丸忌鹽按犀角苦寒本入心家瀉火又入肝臟者蓋以火不妄炎則金能制木也丹溪曰屬陽性走比諸角猶甚痘瘡後用以散餘毒俗以為常若非有餘毒而血虛者與以燥發熱者用之禍無極矣雷公云凡使勿用奴犀角病水犀攣子犀無潤犀惟取烏黑肌皺摺裂光潤者上凡修治時銼其屑入臼中杵令細再入臼中研萬匝方入藥用婦人有妊勿服能消胎氣忌鹽羚羊角味苦鹹性寒無毒入肝經主傷寒熱在肌膚溫氣注伏在骨間邪氣不祥驚夢狂越心神不寧小兒卒熱驚搐產後敗血衝心清心解毒明目益氣燒灰又主食噎不通其角多倒卦痕深入者為真按丹溪曰羚羊屬木宜入厥陰木得其平而風火諸症無能乘矣雷公云凡用有神羊角其神羊角長有二十四節內有天生木胎此角有神力可抵千牛之力也凡修事之時勿令單用不復有驗須要不拆元對以繩縛之力將鐵銼子銼之旋取用勿令風犯銼未盡處須三重紙裹恐力散也銼得了即背風頭重篩過然後入藥中用之若更研萬匝用之更妙免刮人腸也牛黃味苦性平無毒入心經主大人癲狂發痓中風痰壅不語小兒驚癇天吊客忤口噤除邪逐鬼定魄安魂能墮胎孕須體輕微香磨用色透置舌上先苦後甘清涼透心者為真人參為使惡龍骨地黃龍膽蜚蠊常山畏牛膝乾漆按牛黃味苦宜歸心部癲狂等症何不屬心而有不療者耶雷公云凡使有四件第一是生神黃賺得者次有角黃是取之者又有心黃是病死者後識者剝之擘破取心其黃在心中如濃黃醬汁採得便收於水中黃沾水後便如碎蒺藜子許如豆大便如帝珠子次有肝黃其牛身上光眼如血色時復鳴吼照水自有皮光恐懼人或有人別採之可有神妙之事凡修事先搗細研如塵用絹裹又用黃嫩牛皮裹安於井面上去水三四尺以來一宿天明方取用之麝香味辛性溫無毒入十二經主惡氣鬼邪蛇虺蠱毒驚悸癰疽中惡心腹暴痛脹滿目中翳膜淚眵風毒溫瘧癇痓通關竅殺蠱蝨催生墮胎忌大蒜按麝香為諸香之最其氣透入骨髓故於經絡無所不入然辛香之劑必能耗損真元用之不當反引邪入髓莫可救藥誠宜謹之雷公云凡使多有偽者不如不用其香有三等一名遺香乃是子臍閉滿自於石上用蹄尖剔出落處一里草水不生並焦黃人若取得此香價與珍珠同也二名臍香採得甚堪用三名結香被大獸捕逐驚畏墜死被人收得擘破見心血在脾上結作一個乾血塊不堪入藥凡使麝香勿近火日磁缽中細研任用鹿茸味甘鹹性溫無毒入腎經主益氣滋陰強志補腎理虛羸固齒牙止腰膝痠疼破流血作痛療虛勞如瘧女子崩漏胎動丈夫溺血泄精小兒驚癇散石淋癰腫骨中熱中癢狀如瑪瑙紅玉長三四寸破之中有朽木者佳連頂骨用長城鹿角主逐鬼邪益神氣續絕傷強筋骨消癰腫愈惡瘡及婦人夢與鬼交麋茸及角功相仿而性更熱專主補陽糜鹿角茸四種俱杜仲為使畏大黃按鹿茸鹹溫之品舍腎奚歸功效雖宏須脈沉細相火衰弱者始為相宜若有火熱者用之何異抱薪救火其角亦然麋者更甚夫麋冬至解角則屬陽鹿夏至解角則屬陰其性熱所以其功捷大凡含血之物肉易長角難長惟二茸不兩月長大至一十二斤其堅如石生長神奇莫過於此且諸獸之角終身不易惟此種一年一易蓋其性熱生生不已舊者未去新者隨之氣化膿密孰能與京諸賢盛述其功良有以也雷公云凡使先以天靈蓋作末然後鋸解鹿茸作片子以好羊脂拌天靈蓋末塗之於鹿茸上慢火炙之令內外黃脆了用鹿皮裹之安室中一宿其藥魂歸也至明則以慢火焙之令脆方搗作末用之每五兩鹿茸用羊脂三兩炙盡為度又製法用黃柏自然汁浸兩日夜漉出焙令乾搗漉免渴人也鹿角使之勝如麋角其角要黃色緊重大好者緣此鹿食靈草所以異於眾鹿也其麋角頂根上有黃色毛若金線兼旁生小尖也色蒼白者上注干寧記云其鹿游龍相戲乃生此異耳採得角了須金戴者並長三寸鋸解之以物盛於急水中浸之一百日滿出用刀刮去粗皮一重以物盛水治令淨然後用釅醋煮七日旋旋添醋勿食少歇成時不用煮火只從子時至戌七日足其角白色軟如粉即細搗作粉卻以無灰酒煮其膠陰乾了重重研篩過用凡修事十兩以無灰酒一盞煎乾為度也孫真人云鹿肉解藥毒不可久服蓋服解毒草也孟詵云主益氣不可以鼻嗅其茸中有小白蟲視之不見入人鼻必為蟲顙藥不及也阿膠味甘鹹性微溫無毒入肺肝腎三經主風淫木旺肢節痿疼火盛金衰喘嗽痰血補勞傷療崩帶滋腎安胎益氣止痢明澈如水質脆易斷者真山藥為使畏大黃蛤粉炒成珠用按阿膠用黑驢皮造成黑屬水專入腎能剋火蓋以制熱則生風之義故宜入肝且火得制則金亦無侵故又宜入肺夫東阿井系濟水所生性急下趨清而且重用之煎煮攪濁澄清所以能清上炎之火及上逆之痰也熊膽味苦性寒無毒入膽經主時氣熱盛變為黃疸小兒風痰壅寒驚癇疳䘌殺蟲散毒可敷惡瘡及痔入水分塵如練不散者真惡防己地黃按熊膽入膽從其類也清火定驚之功較勝諸膽雷公云凡收得後煉就器中安每一斤熊膽入生椒十四個煉去滓並椒入瓶中心任用之膃肭臍味鹹性大熱無毒入脾命門二經主助腎添精補中益氣鬼氣屍疰夢與鬼交宿血症結心腹疼痛置睡犬旁驚狂跳走入水不冰者真酒浸一宿紙裹於文火上炙脆細銼搗用按肭臍咸熱之品本入命門補火脾家所快者肭熱也故亦入之助陽之功獨甲群劑今出登萊州即海狗腎也其狀頭似豕尾似魚止生兩足價殊貴類多偽者須細辨之雷公云凡使先須細認其偽者海中有獸號曰水烏龍海人採得取腎以充膃肭臍入諸藥中修合恐有誤其物自殊有一對其有兩重薄皮裹丸核其皮上自有肉黃毛一穴三莖收之器中年年濕潤如新置於犬頭上其驚跳如狂即是真也須用酒浸一日後以紙裹微微火上炙令香細銼單搗也狗肉味鹹酸性熱無毒入命門經主壯元陽補絕傷安五臟益氣力其陰莖最助房事及治婦人帶漏十二疾血主補陰辟邪療癲狗忌蒜按狗亦咸熱之品命門之所由歸也助火最速有熱症者所以深戒炙而食之令人發渴不止九月食之傷神孕婦食之生子缺唇且無聲丹溪曰人之虛皆陰虛也陰虛則陽必亢用狗為補寧不熾其火以甚其病也世人信其補虛以為指陽虛也不知凡虛屬陰若果陽虛死亡立至倉扁復生無能措手豈此之能補乎雖然丹溪生平主意只是滋陰故有此論而溫補之功諸傢俱道當非虛語惟命門脈弱素無火症者殊為相宜不然則未獲其功先嚐其禍矣羊肉味甘性大熱無毒入脾肺二經主虛勞寒冷腦風大風補脾益氣安心定驚按羊肉之甘宜其歸脾於卦為兌實屬西方之金故亦入肺臟十劑云補可以去弱人參羊肉之類是也夫人參補氣在中羊肉補形在表凡補虛者當分用之不得概視也六月食之傷神孕婦及水腫骨蒸瘧疾一切火症咸宜忌之黃牛肉味甘性平無毒入脾經主安中益氣健脾養胃強骨壯筋其乳補虛弱養心肺潤皮膚解熱毒止消渴滑大腸腦治頭風膽主風痰角腮主赤白帶及行血按牛肉色黃味甘屬土於卦為兌故專入脾家用之倒倉誠有再造之功然此為稼穡之資不輕屠殺其自死及有病老邁者不惟無補反能損人市中多犯此弊食者慎之豬肉味甘性溫無毒入脾經主補脾益氣然多食能動風痰四蹄主撻傷下乳及諸瘡臟腸主內痔腎主腰疼肚能扶胃肺能止嗽心能定驚舌能健脾油可敷瘡腦治頭痃腦鳴膏能潤肺利血脈解風熱按豬肉之甘自宜入脾遍身之用各以類從丹溪謂其熱能生痰痰多則氣不升降故外感者食之而愈劇患瘧者食之而覆成善頤生者節食為貴蟲魚部蜂蜜味甘性平無毒入脾肺二經主益氣補中潤燥解毒祛邪定經養脾氣除心煩通便閉解虛熱療心疼悅顏色和百藥除眾病畏生蔥惡芫花每斤煉至十二兩半用蠟主痢下諸瘡按蜂蜜甘宜歸脾潤宜歸肺其用最多良有百花之精且取人溺以釀之故也七月勿食生蜜令人暴下霍亂雷公云凡煉蜜一斤只得十二兩半或一分是數若火少火過並不可用之也牡蠣味鹹性微寒無毒入腎經主遺泄帶下喉痹咳嗽營衛虛熱去來不定心脅下老痰痞積宿血溫瘧瘡腫結核貝母為使喜甘草牛膝遠志蛇床惡麻黃吳茱萸辛夷火煅微紅杵絕細用按牡蠣本是鹹水結成故專歸腎部軟堅收斂之劑也雷公云有石牡蠣頭邊皆大小甲沙石真似牡蠣只是圓如龜殼海牡蠣可用只是丈夫服之令人無髭真牡蠣火煅過用瑿試之隨手走起者是也瑿是萬年琥珀凡修事先用二十個以東流水入鹽一兩煮一伏時後入火中燒退赤入缽中研如粉用珍珠味無考性寒無毒入心經主手足皮膚逆臚鎮心潤顏止渴墜痰點目去膜塞耳除聾催生下死胎又主小兒驚熱風癲須未經鑽眼者研細篩過再研二萬下方用按珍珠為水精所孕專能制火且其性鎮重心經之所由入也研之不細傷人臟腑功未獲奏害已隨之雷公云須取淨新者以絹袋盛之然後用地榆五加皮五方草三味各四兩細銼了又以牡蠣約重四五斤以來先置於平底鐺中以物四向安令穩然後置珍珠於上方下銼子三件藥籠之以漿水煮三日夜勿令火歇日滿出之用甘草湯洗之令淨後於臼中搗令細以絹羅重重篩過卻更研二萬下用凡使要不傷破鑽透者方可用石決明味鹹性平無毒入肝經主風熱青盲內障骨蒸勞熱久服益精九孔七孔者良以麵裹煨磨去其外黑處並粗皮搗細於乳缽中再研細極永忌山桃按石決明本水族也宜足以生木而制陽光故獨入肝家為眼科要藥命曰決明者丹溪所謂以能而名也雷公云凡使先去上粗皮用鹽並東流水於大磁中煮一伏時漉出拭乾搗為末研如粉卻入鍋中以東流水淘三度日乾再研一萬匝入藥服至十兩永不得食山桃令人喪目凡修事五兩以鹽半分取則第二度淘用地榆五加皮阿膠各十兩龜甲味鹹甘性平無毒入心脾肝三經主陰虛不足骨蒸勞熱癥瘕瘧痃五痔陰蝕四肢重弱血麻痹風疾產前後痢疾驚恚氣心腹痛傷寒勞復肌體寒熱欲死小兒囟門不合及頭瘡女子赤白漏下及陰癢逐瘀血續筋骨催生益智自敗者更佳酥炙用龜尿主耳聾久嗽斷瘧俱畏狗膽惡沙參蜚蠊按龜甲稟壬癸之氣而生其補陰也甚捷心主血肝藏血脾裹血故併入之骨蒸云云等症靡非陰虛所致用此主之不亦宜哉欲取其尿者取龜置磁器中以鏡照之既見鏡中影則淫發而失尿另有一種夾蛇龜中心折者不堪服食生搗其肉罯敷蛇毒最良敗龜版及自死之龜形肉滲爛甲內性氣俱全故其功力較倍今本經以卜師鑽灼者為是恐非灼者不過燒炙焦黑而已與生者何異又何取久特加敗字諄諄以示人耶鱉甲味鹹性平無毒入肺脾二經主骨蒸勞嗽積聚癥瘕息肉陰蝕痔疽瘡腫瘀血催生墮胎婦人五色漏下九肋者佳童便浸一宿濾起酥炙用其肉益肺補金大涼血熱奇形異狀者有大毒誤食者以黃耆吳藍煎湯解之俱惡理石礬按丹溪云鱉甲屬金與土肺脾之所以入也須生取之煮脫者不堪用肉性大冷過食傷脾癥瘕勿食恐益其疾孕婦勿食恐短子項同雞食成瘕同雞子食能殺人同同莧菜食生血鱉同芥子食發惡疾不可不慎雷公云凡使用要綠色九肋多裙重七兩者為佳治痞破塊消症定心藥中用之每個鱉甲以六一泥固瓶子底待乾安甲於中以物搘起用頭醋下火煎之盡三升醋為度乃去裙並肋骨方炙乾後入藥中用又治勞去熱藥中用法似前不用醋須用童子小便煮晝夜小便一斗二升為度後去裙留骨於石臼中搗成粉子以雞䏶皮裹之取東流水三兩鬥盆盛擱於盆上一宿至明任用力有萬倍也蘄州烏蛇味甘性平有小毒入脾肺二經主諸風皮膚不仁散癮疹身體瘙癢熱毒風淫眉髭脫落塞耳治聾須辨真者佳去頭及皮鱗帶子銼碎酒浸一宿酥炙埋地一宿炙乾用按烏蛇之用專主去風以理皮肉之症肺主皮毛脾主肌肉故兩入之色黑如漆背有三稜渾如劍脊尾細尖長性善不傷生命都在蘆叢中嗅其花氣亦乘南風而吸雖至枯死兩目不陷儼如生者頭有逆毛二寸一路可長半分以來頭尾相對稱之重七錢至一兩者為上粗大者轉重力彌減也雷公云凡一切蛇須認取雌雄及州土蘄州烏蛇頭上有逆毛二寸一路可長半分以來頭尾相對使之入藥如神只重一兩以下彼處得此多留進供蛇腹下有白腸帶子一條可長一寸以來即是雄也採得去其頭兼皮鱗帶子銼之以苦酒浸之一宿至明漉出向柳木灰中焙之令乾了卻以酥炙之酥盡為度炙乾後於地上掘一坑可深一尺以來安蛇於中一宿至明再炙令乾任用凡修事一切蛇並去膽並上皮了乾溼須酒煮之用之良白花蛇味甘鹹性溫有大毒入肺肝二經主肺風鼻塞去癮疹浮風四肢不仁骨節疼痛口眼喎斜半身不遂癩麻風白癜風髭眉脫落鼻柱塌壞鶴膝風筋骨拘攣凡使須火燒一尺磚令通紅醋沃之使熱氣熏蒸將蛇頭尾各一尺去淨置磚上以盆覆一宿如此三過去骨取肉用亦以眼不陷者為真按白花蛇專主皮膚之風肺主皮毛肝為風水故都入之然服之者瞑睡一晝夜方醒善螫人中足者輒自斷之補養已痊木接代步不然令人死其毒可知然諸藥不效者獨能引達成功以其性竄直領藥力至於風處所謂大毒之病必用大毒之藥以攻之是也諸蛇鼻向下惟此蛇鼻向上背有方勝花紋以此得名愚謂凡用之更須日日換酒浸過五宿去酒不用炙用盡去皮骨埋於土坑一宿取出再其毒咸去矣雷公云凡使用治風速於諸蛇緣蛇性竄即令引藥至於有風疾處故能治風蝦蟆味甘性寒無毒入脾經主除邪氣破堅血解結熱療兒疳貼癰腫療大傷凡使去皮及腸並爪陰乾塗牛酥炙用眉酥主蛀牙惡瘡疔腫瘰癧痔漏助陽其肋塗玉即刻之如蠟按蝦蟆歸脾甘之故也形狀與蟾蜍相似本經未嘗分析自陳藏器極口分殊以為蝦蟆背有黑點身小能跳接百蟲在陂澤間舉動極急蟾蜍身大嘴黑點多痱磊不能跳不解作聲行動遲緩腹下有丹書八字者然意其功用無甚差別想有牝牡之分而種類之異也雷公云有多般勿誤用有黑虎有䖲黃有黃蛤有螻蟈有蟾其形各別其蝦蟆皮上腹下有斑點腳短不鳴叫者是也黑虎身小黑嘴腳小斑䖲黃斑色前腳大後腿有小尾子一條黃蛤遍身黃色腹下有臍帶長五七分以來所住處帶下有自然汁出螻蟈即夜鳴腰細口大皮蒼黑色蟾即黃斑頭有肉角凡使蝦蟆先去皮並腸及爪子陰乾然後塗酥炙令乾每修事一個用牛酥一分炙盡為度若使黑虎即和頭尾皮並陰乾酒浸三日漉出焙乾用之蠍味甘辛性平有毒入肝經主小兒風癇手足抽掣大人中風口眼喎斜風痰耳聾風毒癮疹出青州緊小者良去鹽土炙黃用按蠍之主療莫非風症肝為巽風宜獨入之喜螫人甚者令人死雄者螫人痛在一處取井泥敷之稍溫則易雌者螫人痛牽諸處用瓦屋溝下流敷之或不值天雨可汲新水調用如螫手足竟以冷水浸之微暖即易若余處不可用水浸者則以冷水浸布貼之小暖則易觀其喜寒若此則為大熱之劑無疑今諸書不載其性惟日華子稱其平故姑錄之此即方書所稱蛜螂者是也五靈脂味甘性溫無毒入心肝二經主心腹冷氣疼痛腸風產後血暈小兒疳疣去目翳闢疫氣解蛇毒酒研飛煉令去研石為佳生者行血炒者止血按五靈脂專主血症心主血肝藏血故兩入之行氣血最捷勿宜過用以傷臟腑蜈蚣味辛性溫有毒不載經絡主小兒口噤鬼疰蠱毒諸蛇毒殺精物溫瘧去三蟲心腹寒熱結聚去瘀血墮胎去頭足慢火炙黃用畏蛞蝓蜒蚰大蒜雞屎按蜈蚣最似百足蟲第百足蟲足較細密死而不僵頭上有白肉面及尖嘴其毒更甚勿宜輕用雷公云凡使勿用千足蟲真似只是頭上有角肉面並嘴尖若誤用者腥臭氣入頂致死凡使用蜈蚣用柳木末放於器中炒木末焦黑後去木末用竹刀刮去足用蝸牛味鹹性寒有小毒不載經絡主賊風口眼喎斜驚風筋脈拘攣收大腸脫肛痔痛消渴累疳火炒過用按蝸牛之名以頭有角似牛也夏月往往升高涎盡即枯死必用火炒者誠欲去其寒毒爾是即蛞蝓也圖經考之甚核本草分為四種恐非有一種田螺主眼赤熱瘡醒酒渴點痔瘡類分數種功約相同茲不多贅白殭蠶味鹹辛性微溫有小毒入心肝脾肺四經主風溫口噤失音疔毒風痰結滯皮膚風動如蟲行小兒驚癇夜啼女子崩中赤白止陰癢去三蟲滅黑點米泔水浸去涎炒去絲用惡茯苓茯神萆薢桑螵蛸桔梗雄蠶蛾性熱主固精強陽交接不倦按丹溪云白殭蠶屬火而有土與金水心肝脾肺之所由入也凡使須頭番者力倍蠶蛾亦然雷公云凡使先須以糯米泔浸一日待蠶桑涎出如蝸牛涎浮水面上然後漉出微火焙乾以布淨拭蠶上黃白毛並黑和甲子單搗篩如粉用也蟬蛻味鹹甘性寒無毒不載經絡主催生下胎衣通乳汁止夜啼驚癇逐邪熱殺疳蠱亦能止渴按蟬有五種陳藏器辨之悉今以形極大而聲極高一鳴而無所停斷者入藥最良西川有一種蟬花乃蟬在殼中不出而化為花自頂中生出功用略同故不另載刺蝟皮味苦甘性平有小毒不載經絡主五痔腸風瀉血翻胃鼻衄腹痛積疝陰腫痛酒煮熬用畏桔梗門冬按蝟亦有數種惟蒼白色腳似豬蹄者佳此外並不宜用其骨切忌入口令人消瘦土鱉蟲味鹹性寒有毒入心肝脾三經主留血壅瘀心腹寒熱洗洗祛堅積癥瘕下乳通經一名䗪蟲畏屋遊皂角菖蒲按土鱉專主血症心主血肝藏血脾裹血故三入之今跌打損傷者往往主此或不效則加而用之殊不知有瘀血作疼者誠為要藥倘無瘀血而其傷在筋骨臟腑之間法當和補愚者不察久服弗已其流禍可勝數耶蜣螂味鹹酸性寒有小毒不載經絡主小兒驚風瘛瘲大人癲狂疰忤破血墮胎通腸治脹又主疔惡諸瘡出箭頭入肉去足翅火炙勿置水中令人吐畏羊肉羊角按莊子云蜣螂之智在於轉丸宜其皮血通腸之功矣驚狂皆屬炎亦賴之以泄其亢耳其性猛驟最能傷脾勿得概用斑蝥味辛鹹性寒有大毒不載經絡主寒熱鬼疰蟲毒鼠漏疥癬惡瘡疽蝕死肌破石癃血積利水道墮胎凡使去足翅拌糯米炒米黃為度馬刀為使畏巴豆丹參空青惡曾青豆花按斑蝥入腹有開山鑿嶺之勢最稱猛烈故輒致腹痛不可忍余見里中一壯年患痞疾服斑蝥數劑初則大瀉不止煩悶欲絕斷則二便來紅三日而死自非百藥不效之病不可輕使穿山甲味甘鹹性微寒有毒不載經絡主五邪驚悸婦人鬼魅悲傷山嵐瘴瘧惡瘡疥癬蟻漏痔漏亦能去風炙黃用按穿山甲形似鯉魚有四足能陸能水山岸間開鱗甲如死令蟻入中閉而入水開甲蟻浮水面於是食之故主蟻漏其性喜穿山是以名之故其用亦主潰癰疽通血脈及治吹乳疼痛鯽魚味甘性溫無毒入脾胃二經主溫胃健脾進飲食補虛羸療腸澼水穀不調腸風血瘀燒灰可敷諸瘡其子調中益肝氣惡豬肉雉沙糖按鯽魚甘溫之品且是土所化成其入脾胃宜矣集要雜錄云諸魚屬火惟鯽魚屬土而有調胃入腸之功然多食亦能動火鯉魚味甘性平無毒入脾肺肝三經主咳逆氣喘上氣水腫腳滿黃疸煩渴安胎妊娠身腫冷氣痃癖氣塊橫關伏梁膽點眼去翳滴耳除聾塗小兒熱腫血塗小兒丹毒及瘡脂主小兒癇疾驚悸鱗燒灰酒服破產婦滯血腸主小兒肌瘡瘰癧取蟲骨主陰蝕赤白帶下齒主癃閉石淋皮主癮疹惡瘡忌豬肝天麥門按鯉魚之甘本入脾家土能生金金能制木故亦入肺肝二經衍義曰鯉魚至陰之物也故其鱗三十六陰極則陽復所以有魚熱中之故叔和曰熱即生風故食之多發風熱諸家並不論及惟日華子云鯉魚涼恐無是理萬一風症更使食魚則是貽禍無窮矣煙燻者損目天行病後食之再發必死烏賊骨味鹹性微溫有小毒入腎經主崩漏赤白帶下經閉陰蝕腫痛除目翳止淚理金瘡止血治驚氣入腹腹痛環臍陰莖因寒腫瘡多膿汁寒熱症瘕久服令人有子惡白蘞白芨附子按烏賊之咸宜歸水臟治病有殊效今用之者鮮夫亦未達其功歟雷公云凡使勿用沙魚骨緣真相似只是上紋橫不入藥中用凡使要上紋順以血沾作水浸並煮一伏時了漉出於屋下掘一地穴可盛得前拌為賊魚骨多少先燒坑子去炭灰盛藥一宿至明取出用之其效倍多鰻鱺魚味甘性平有微毒不載經絡主虛勞不足陽事衰微傳屍鬼疰蠱毒諸蟲婦人陰瘡蟲癢帶下皮膚惡瘡疳䘌痔漏腰背間風寒濕痹諸般草石藥毒腳氣癧瘍風白剝風肉燒室內可闢蚊蟲骨置廂中能除衣蠹按鰻鱺雖有小毒而功甚溥或言是蛟蜃之類未可盡信今據稽神錄載主療傳屍甚奇信亦非常物也五色全者其功最勝然罕能得爾鱔魚味甘性大溫無毒入脾經主產後淋瀝血氣不調腹中冷氣腸鳴及濕痹氣又主補脾益氣血堪塗癬按鱔魚甘溫之品脾所快也宜專入之生於泥窟其性善蟄過夏方出則為陰類可知大有補血之功惜本經及諸家未能悉載爾多食令人霍亂時行病食之多復雷公云凡魚頭有白色如連珠及腹中無膽者頭中無腮者並殺人注不可合鸕鷀肉食之鯽魚不可合鹿雉肉食之鰍鱔不可合白犬血食之鯉魚子不可合豬肝食之鯽魚亦爾青魚鮓不可生胡荽及生葵並麥醬食之蝦無須及腹中通黑及煮之反白者皆不可食生蝦鱠不可合雞肉食之亦損人蟹味鹹性寒有微毒不載經絡主散血破結益氣養筋除胸熱煩悶搗塗漆瘡爪專主破血墮胎惡柿子按蟹者解也故其用主散不主斂過食令人傷脾吐瀉風疾食之再發孕婦食之橫生狀異者能殺人誤中其毒用頭水冬瓜黑豆煎湯並可解之
