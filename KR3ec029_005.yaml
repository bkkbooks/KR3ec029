body:
  text: 卷五木部白茯苓味淡微甘性平無毒入肺脾小腸三經主補脾氣利小便止煩渴定驚悸久服延年去皮心研細入水中攪之浮者是其筋也宜去之誤服損目赤者專主利水抱根而生者名茯神主補心安神除驚悸治健忘馬蘭為使惡白蘞畏牡蒙地榆雄黃秦艽龜甲忌醋及酸物按茯苓色白是西方肺金之象也味淡是太陽滲利之品也微甘是中央脾土之味也故均入之夫脾最惡濕而小便利則濕自除所以補脾既能滲泄燥脾似不能生津已潔古何為稱其止渴良由色白屬金能培肺部肺金得補則自能生水且經曰膀胱者州都之官津液藏焉氣化則能出矣誠以其上連於肺得肺氣以化之津液從之出爾藥性所謂白者入壬癸亦此意也而渴有不止者乎至於驚悸者心經之虛也而心與小腸相為表裡既瀉小腸而心火亦為之清矣故能定之丹溪曰陰虛未為相宜蓋虞其滲泄爾然味尚甘甘主緩亦無大害非若豬苓一於淡滲而大傷陰分也藥性云小便多而能止大便結而能通與本功相反未可輕信赤者屬丙丁專入膀胱瀉火故利水之外無他長茯神抱根有依而附之之義驚悸者魂不能附健忘者神不能守宜其治矣廣志云茯神松脂所作勝茯苓衍義曰氣盛者泄於身不抱本根結為茯苓有津氣而不甚盛不離其本結為茯神考茲兩書各相違悖然仙經服食多需茯苓而茯神不與焉兩說之是非於是乎辨琥珀味甘性平無毒入心脾小腸三經主闢百邪安五臟定魂魄止心痛消瘀血利水道通五淋破癥結去目翳敷金瘡按琥珀乃松脂入地千載化成得土既久宜入脾家松之有脂猶人之有血與水也且成珀者有下注之義又宜入心與小腸內經曰主不明則十二官危便道閉塞而不通服琥珀則神室得令五臟安魂魄定邪何所附病何自生邪於是便道通而瘀血諸證靡弗去矣夫目得血而能視心寧則榮和而翳何足虞金瘡者惟患其血逆於腠爾能止之和之未有不瘳者也丹溪曰古方用以燥脾土有功脾能運化則肺氣下降故小便可通若血少不利者反致其燥急之苦別說云茯苓生成於陰者也琥珀生於陽而成於陰者也故皆主安心利水而治榮雷公云凡使紅松脂石珀水珀花珀物象珀翳珀琥珀紅松脂如琥珀只是大脆紋橫水珀多無紅色如淺黃多粗皮彼石珀如石重色黃不堪用花珀紋似新馬尾松心紋一路赤一路黃物象珀其內似有物極為神妙翳珀為衆珀之長故號曰翳珀琥珀如血色安於布上拭吸得芥子者真也凡入藥中用水調側柏子末安於瓷禍中安琥珀於末中了下火煮從巳至申別有異光便搗如粉重篩用松香味苦甘性溫無毒入脾肺二經主安五臟除伏熱解消渴逐諸風療癰疽惡瘡及白禿疥瘙風氣金傷止血殺蟲定痛松子益氣補虛松花清心解煩松葉生毛髮去風濕灸罯凍松節主骨節久風腳痹疼痛久服俱能辟穀延年按松香甘溫之品與脾部相宜而肺者脾之子也故兩入之伏熱等證悉屬二經烏得不治子花節葉主療小異亦親上親下之道也柏子仁味甘辛性平無毒入肺脾腎三經主安五臟定驚悸補中氣除風濕興陽道暖腰膝去頭風闢百邪潤皮膚明耳目側柏葉味苦澀性微寒止吐衄崩痢除風冷濕痹烏須黑髮灸罯凍瘡久服延年牡蠣桂瓜子為使畏菊花羊蹄草諸石及面曲按柏子仁辛歸肺甘歸脾濁陰歸腎故均入之柏葉之苦澀屬金而善守最清血分為補陰要藥須用嫩葉春採東夏採南秋採西冬採北才得節候生氣雷公云凡使先以酒浸一宿至明漉曬乾用黃精自然汁日中煎手不住攪若夫天陰即於當中著火用瓶器盛柏子仁著火緩緩煮成膏為度每煎三兩柏子仁用酒五兩浸干為度桂味辛甘性大熱有毒其在下最厚者曰肉桂去其粗皮為桂心入心脾肺腎四經主九種心疼補勞傷通九竅暖水臟續筋骨殺三蟲散積氣破瘀血下胎衣除咳逆療腹痛止瀉痢善發汗其在中次厚者曰官桂入肝脾二經主上焦有寒走肩臂而行枝節其在嫩枝四發者曰桂枝專入肺經主解肌發表理有汗之傷寒四者皆殺草木毒百藥無畏性忌生蔥按桂在下有入腎之理屬火有入心之義而辛散之性與肺部相投甘溫之性與脾家相悅故均入焉官桂在中而肝脾皆在中之臟也且經曰肝欲散急食辛以散之以辛補之又曰脾欲緩急食甘以緩之以甘補之桂味辛甘二經之所由入也薄桂在上而肺胃亦居上故宜入之桂枝四發有發散之義且氣味俱輕宜入太陰而主表丹溪曰仲景救表用桂枝非表有虛而用以補也衛有風寒故病自汗以此發其邪則衛和而表密汗自止爾衍義乃謂仲景治表虛誤也本草言桂發汗正合素問辛甘發散之義後人用桂止汗失經旨矣大抵桂為陽中之陽壯年火旺者忌食惟命門火衰不能生土納穀不化及産後虛弱者宜之細考桂有數種論之者無慮數十家或言種異或言地殊各不相侔咸無所據詢之交廣商人所販惟陳藏器所謂雖分數等同是一物此說最當別說亦稱之矣今採其意以詳別如上雷公云凡使去薄者要紫色厚者去上粗皮取心中味辛者用每斤大厚紫桂只取得五兩取有味厚處生用如未用即用重裹熟絹並紙裹勿令犯風其州上只有桂草無桂心用桂草煮丹陽木皮遂成桂心凡使即單搗用槐實味苦酸鹹性寒無毒入心肝大腸三經主五內邪熱腸風五痔湯火瘍瘡男子囊墜腫痛陰瘡濕證婦人陰中痛癢崩中漏下明目補腦殺蠱去風黑髮延年酒服能催生墮胎枝專主洗濕熱諸瘡治九種心疼皮主中風拘攣齒痛疳䘌消癰解毒止痛長肉膠主肝臟風筋脈抽掣及急風口噤四肢不收或毒風周身如蟲行破傷危急花與實同功又主心痛及疔腫熱毒赤白下痢小兒驚癇景天為使按槐實之苦能泄心火酸寒之性能伐肝經經曰酸苦湧泄為陰其功主降故又入大腸以理下焦諸證且催産難夫蟲之生也因於濕風之生也因於熱濕熱既去又奚庸虞花枝皮葉主治大同小異久為痔瘡要藥木香味苦辛性微溫無毒入心肺肝脾胃膀胱六經主心腹一切氣疾癖症塊九種心疼止瀉痢除霍亂健脾胃消食積定嘔逆下痰壅辟邪氣瘟疫殺瘧蠱清物宜生磨用火炒令人脹形如枯骨苦口沾牙者良按木香辛入肺苦入心溫宜脾胃肝者心之母也膀胱者肺所連也故均入焉蓋心乃一身之主氣血之所聽命者也有主則能塞氣肺氣調則金能制木而肝火自伏矣凡人有怒則肝氣拂逆而反忤其元氣心有從肝之情而不能制則肝氣於是乎盛或為拂逆或為氣衝得木香則心氣暢而正氣亦暢肝氣何拂逆之有哉實心之行夫肝也非肝之自行也東垣以黃連制之惡其氣行過於通暢不無走泄之患爾雷公云凡使其木香是蘆蔓根條五盤旋採得二十九日方硬如朽骨硬碎其有蘆頭丁蓋子色青者是木香神也山梔味苦性寒無毒入心肺大小腸胃膀胱六經主五內邪熱亡血津枯面紅目赤癰腫瘡瘍五種黃病開鬱瀉火療心中懊憹顛倒而不眠治臍下血滯小便而不利皮走肌膚之熱仁去心胸之熱解羊躑躅及䘌蟲毒按山梔味苦歸心輕飄象肺入腸則供肺為傳道者也小腸受盛與心應者也胃亦上焦之腑也膀胱亦肺部之約也故鹹入之以理邪熱諸證潔古曰輕清上行丹溪又曰屈曲下行兩家之說似相左矣不知惟其上行最能清肺肺氣清而化則小便從此氣化而出經曰膀胱藏津液氣化則能出者是也虛火炎者炒黑用煩郁嘔逆者薑汁炒用此外並宜生服雷公云凡使勿用顆大者號曰伏凡梔子無力須要如雀腦並須長有九路赤色者上凡使先去皮須取仁以甘草水浸一宿漉出焙乾搗篩如金末用吳茱萸味苦辛性熱有小毒入肝脾胃大腸腎五經主下氣消痰寒氣噎塞心腹刺痛霍亂轉筋腳氣攻心止咳逆逐風邪消宿食除血痹鹽湯炮去毒用蓼實為使惡丹參硝石白堊畏紫石英按吳茱萸辛熱之劑宜入五經以理寒證多食大損元氣腸虛者忌之雷公云凡使先去葉梗並雜收子用大盆二口使鹽水洗一百轉自然無涎日乾任入丸散中用修事十兩用鹽二兩研作末投東流水四投中分作一百度洗則有大效若用醋煮即先沸醋三十餘沸後共茱萸沸醋盡曬乾每用十兩使醋鎰為度山茱萸味甘酸微溫無毒入肝腎二經主通邪氣逐風痹破癥結通九竅除鼻塞療耳聾殺三蟲安五臟壯元陽固精髓利小便去梗用蓼實為使惡桔梗防風防己按山茱萸大補精血故入少陰厥陰六味丸用之取其補腎而不傷於熱耳若舍是而別求熱劑以為淫欲助猶棄賢良而搜佞幸也愚乎哉雷公云凡使勿用雀兒蘇臭似山茱萸只是核八稜不入藥使山茱萸須去內核每修事去核子一斤取內皮用只存成四兩以來緩火熬之方用能壯元氣精祕其核最滑精蔓荊子味苦甘辛性微寒無毒入肝經主散風寒療頭風除目痛去翳膜堅齒牙利九竅殺百蟲酒浸一宿蒸用惡石膏烏頭按經曰東方青色入通於肝開竅於目又曰風生木木生酸酸生肝荊實入肝故專主散風以療目疾主治祕訣云其味苦甘為陽中之陰能涼諸經之血熱杜仲味辛甘性溫無毒入腎經主陰下濕癢小便餘瀝強志壯筋骨滋腎止腰痛去粗皮酥蜜炙去絲用惡蛇蛻玄參按杜仲降而屬陽宜職腎家之證然精血燥者不宜多用雷公云凡使先須削去粗皮用酥蜜和作一兩炙之以盡為度炙乾了細銼用凡修事一斤酥一兩蜜三兩二味相和合處用也烏藥味苦辛性溫無毒入肺脾二經主一切氣證及中惡心腹痛蠱毒鬼疰天行疫瘴嘔逆脹滿霍亂吐瀉癰癤疥癩按烏藥辛宜於肺溫宜於脾故主中惡等證癰癤疥癩成於血逆始於氣逆烏藥長於理氣故並療之然辛溫發散不宜久用恐損真元厚朴味苦辛性溫無毒入脾胃二經去實滿而治腹脹除濕結而和胃氣止嘔清痰溫中消食乾薑為使惡澤瀉寒水石硝石忌食豆按厚朴辛則能發溫則能行脾胃之所喜也故入之以理諸證丹溪曰厚朴屬土而有火平胃散用之以佐蒼朮正謂瀉上焦之濕平胃土不使太過以致於和而已若以為溫補而泛用之非也體重濁而微降最能耗氣春夏秋宜用冬間忌之氣虛之人及孕婦亦不可服雷公云凡使要用紫色味辛為好或丸散便去粗皮用醋炙過每條一斤用酥四兩炙了細銼若用湯飲下使用自然薑汁八兩炙一日為度黃柏味苦性寒無毒入腎膀胱二經主瀉下焦隱伏之火安上焦虛噦之蟲除臍下痛補腎水衰止血痢治癰瘡明眼目利小便除濕熱療女子熱崩鹽酒多炒免致寒入於腎惡乾漆肉厚鮮黃者佳按黃柏沉而屬陰故主腎與膀胱諸證其性苦寒能泄亢盛之陽以堅腎部則水主既盛陽光自遏而陰血無火爍之患矣豈實有滋補之功哉若腎家無火兩尺微弱或左尺獨旺者均不宜用桑白皮味辛甘性寒無毒入脾肺二經主傷寒羸瘦崩中脈絶肺氣有餘虛勞客熱瘀血停留吐血熱渴止嗽消痰開胃進食利二便消水腫能殺寸白可縫金瘡皮中白汁塗唇燥及小兒口瘡銅刀切片文火蜜炙勿令涎落桂心麻子為使忌見鉛鐵桑枝療手足拘攣陰管作痛眼眶作暈氣逆咳嗽腫毒風癢桑椹開關竅利血脈安神魂黑鬚發明耳目桑寄生主除腰痛去風濕健筋骨充肌膚愈金瘡益血脈長鬚發堅齒牙安胎氣下乳汁止崩漏折其莖深黃色者真按桑皮辛則走西方而瀉肺金甘則歸中央而利脾土然肺氣虛脾氣弱者不宜用之恐潤利之品能走真元爾枝本四發有發散之義椹為桑英有裨益之功而寄生獨産於海外蓋以地暖不蠶桑木無採捋之苦得氣最厚生意濃密葉上自然生出何曾有所謂節間可容他子也此說本之丹溪最為近理圖經諸書胥失之也難得其真誤服殺人用者謹之雷公云凡使在樹上自然生獨枝樹是也採得後用銅刀和枝根莖細銼陰乾任用勿令見火切忌切忌枸杞子味苦甘性微寒無毒入肝腎二經主五內邪熱煩躁消渴周痹風濕下胸脅氣除頭痛明眼目補勞傷堅筋骨益精髓壯心氣強陰益智去皮膚骨節間風散瘡腫熱毒久服延年惡乳酪解面毒按枸杞子味苦可以堅腎性寒可以清肝五內等證孰不本於二經宜其治矣陶隱居云去家千里勿食枸杞此言其補精強腎也然惟甘州者有其功至於土産者味苦但能利大小腸清心除熱而已雷公云凡使用採得後使東流水浸以物刷去土用熟甘草湯浸一宿然後焙乾用其根若似物形狀者佳春食葉夏食子秋冬食根並子也地骨皮味苦性寒無毒入肺腎二經療在表無定之風邪退傳尸有汗之骨蒸除熱清肺止嗽解渴涼血涼骨利二便去骨用按地骨皮即枸杞根也故均入腎又入肺者蓋以其為表則其用在表肺主皮毛所以入二經功用與枸杞相同酸棗仁味酸性平無毒入心脾肝膽四經主筋骨酸寒夜臥不寧虛汗煩渴安和五臟大補心脾炒熟去皮尖研用生者治嗜臥不休惡防己按棗仁味酸本入肝經而心則其所生者也脾則其所制者也膽又其相依之腑也宜併入之聖惠方云膽虛不眠寒也炒熟為末竹葉湯調服蓋以肝膽相為表裡血虛則肝虛肝虛則膽亦虛得熟棗仁之酸溫以旺肝氣則木來剋土脾主四肢又主困倦所以令人多睡又濟衆方云膽實多睡熱也生研為末薑茶湯調服亦以棗仁秋成者也生則得全金氣而能制肝木肝木有制則脾不受侮而運行不睡矣雷公云凡使採得後曬乾取葉重拌酸棗仁蒸半日了去尖皮了任研用益智味辛性溫無毒入脾胃腎三經主遺精虛漏小便餘瀝益氣安神和中止嘔去皮鹽炒用按益智辛溫善逐脾胃之寒邪而土得所勝則腎水無相剋之虞矣遺精諸證吾知免矣檳榔味辛甘澀性溫無毒入胃大腸二經主消穀逐水宣臟利腑攻堅行滯除痰癖殺三蟲卻伏尸療寸白攻腳氣解諸蠱墜藥性如鐵石治厚重如奔馬見火無功按檳榔甘溫之品宜於胃家沉陰之性宜於大腸考諸功驗取其下墜非取其破氣廣閩多服之者蓋以地暖淫蒸居民感之氣亦上盛故服此以降之爾尖長者快鋭速效雷公云凡使存坐穩正堅實不虛者心堅有錦紋者妙半白半黑並心虛者不入藥用凡修事即頭圓矮毗者為榔身形尖紫紋者為檳榔力小檳力大欲使先以刀刮去底細切勿經火大腹皮味苦辛性微溫無毒入肺脾二經主冷熱氣攻心腹疏通關格除脹滿祛壅滯消浮腫酒洗去沙復以大豆汁洗用按大腹辛宜瀉肺溫宜健脾然宣泄太過氣虛者勿用樹上多棲鴆烏汙染糞毒最能為害故必多洗方堪用爾丁香味甘辛性溫無毒入肺脾胃腎四經主口氣腹痛霍亂反胃鬼疰蠱毒及腎氣奔豚氣壯陽暖腰膝療冷氣殺酒毒消痃癖除冷勞有大如山茱萸者名母丁香氣味尤佳按丁香辛溫走肺部甘溫走脾胃腎者土所制而金所生也宜鹹入之果犯寒疴投之輒應倘因火症為禍勿輕陳藏器云拔去白鬚薑汁調塗孔中重生即黑雷公云凡使有雌雄雄顆小雌顆大似棗核方中多使雌力大膏煎中用雄若用須去了蓋乳子發人背癰也冰片味辛苦性溫無毒入肺肝二經主心腹邪氣積聚喉閉乳蛾舌腫痔瘡通九竅消風氣明耳目殺諸蟲解蠱毒又主小兒驚癇大人痰迷按冰片之辛本入肺家而肝則受克者也故兼入焉主治諸症俱是氣閉生熱而冰片則辛散之極開氣如反掌故多用之然亦從治之法也世俗因其主用遂疑其性寒輒與麝香同用以為桂附之助獨不計人身陽易於動陰易於虧丹溪之訓詎可忽諸豬苓味淡性平無毒入膀胱經主利便除濕消腫通淋去黑皮用按豬苓味淡五臟無歸專入膀胱利水今之療瀉者概用之謂其去脾家之濕也不知一於滲泄逐水太過水盡則傷腎昏目不可不知雷公云凡採得用銅刀刮上粗皮一重薄切下東流水浸一宿至明漉出細切以升麻葉對蒸一日去升麻葉令淨曬乾用蘇木味甘鹹性平無毒入肝經主破産後惡血瘡瘍死症一切跌撲損傷調月水去瘀血和新血排膿止痛消癰散腫及主霍亂嘔逆赤白痢下酒蒸乾用按蘇木專主血分宜入肝經然破血之功多而和血之功少勿得多用以傷陰分雷公云凡使去上粗皮並節子若有中心紋橫如紫角者號曰水中尊色具是倍常百等須銼細了重搗拌細條梅枝蒸從巳至申陰乾用沉香味辛苦性溫無毒入腎命門二經主祛惡氣定霍亂補五臟益精氣壯元陽除冷氣破症癖皮膚瘙癢骨節不仁忌見火生磨用按沉香屬陽而性沉多功於下部命腎之所由入也然香劑多燥未免傷血必下焦虛寒者宜之若水臟衰微相火盛炎者誤用則水益枯而火益烈禍無極矣今多以為平和之劑無損於人輒用以化氣其不禍人者幾希雷公云沉香凡使須要不枯者如嘴角硬重沉於水下為上也半沉者次也大凡入丸散中用俟衆藥出即入拌和用也乳香味辛苦性溫無毒入十二經主祛邪下氣補腎益精治霍亂催産難定心腹急疼療癮疹風癢諸般惡瘡風水腫毒中風聾噤亦入敷膏止痛生肌瓦上微炒出油燈草同研用按乳香辛香發散於十二經絡無所不入生南海波斯國赤松脂也垂滴成珠綴木未落者名珠香圓小光明效速滴下如乳熔塌地面者名塌香大塊枯黯效遲用者不可不審沒藥味苦辛性平無毒入十二經主破癥結宿血止痛療金瘡杖瘡痔瘡諸惡腫毒跌打損傷目中翳暈歷節諸風骨節疼痛制同乳香按沒藥與乳香同功大抵血滯則氣壅淤氣壅淤則經絡滿急故痛且腫得沒藥以宣通氣血宜其治矣木瓜味酸性寒無毒入肺脾肝三經主腳氣水腫心腹冷熱痛及奔豚去濕氣調營衛助穀氣和脾胃止吐瀉忌犯鐵器石搗用按木瓜之入三經何也經所謂以酸補肺以酸瀉肝脾則受制於木而孕育夫金者也何弗入焉東垣云氣脫則能收氣滯則能和腰腎腳膝之要藥也香薷飲用之取其專和脾胃培植肺氣除夏間之濕以生至微之金耳雷公云凡使勿誤用和圓子蔓子土茯子其色樣外形真似木瓜只氣味別並向裡子各不同若木瓜皮薄微赤黃香甘酸不澀調營衛助穀氣向裡子頭尖一面方是真木瓜若和圓子色微黃蒂核粗子小圓味澀微酸傷人氣蔓子顆小似木瓜味絶澀不堪用土茯子似木瓜味絶澀子如大祥油麻又苦澀不堪用若餌之令人目澀目赤多筋骨痛凡使木瓜勿犯鐵用銅刀刮去硬皮並子薄切於日中曬卻用黃牛乳汁拌蒸從巳至未其木瓜如膏煎卻於日中薄攤曬乾用也竹葉味甘淡性平無毒入心肺胃三經主新舊風邪之煩熱喘促氣勝之上衝療傷寒解虛煩治消渴療喉痹止嘔吐除咳逆有一種苦竹葉主舌瘡目痛去青刮取為竹茹主胃熱嘔厄除煩解渴療吐衄崩中噎膈氣溢筋極五痔火燒竹瀝主陰虛發熱中風口噤除自汗解消渴止驚悸清煩躁痰在手足四肢非此不達痰在皮裡膜外有此可驅又主小兒天吊驚癇婦人懷孕悶暈胎前不損子産後不得虛筍補氣止渴久食益人按竹葉生於中半以上故主治多在上焦心肺胃皆臟腑之居上者也宜併入之味苦者專瀉南方竹茹者其除土鬱故主用小殊竹瀝者竹之液也猶人身之血也極能補陰況陰之不足由於火爍竹瀝長於清火則血得其養本經已載其功丹溪又詳其效而世俗不能常用者蓋泥證類之大寒爾不知竹即筍之老者也今人自幼食筍至老不撤曾無中其寒涼之害者瀝則假火而成何寒之有證類之所大寒者蓋表其功非論其氣也幸高明者准之以理斯藥無遺用矣天竺黃味甘性寒無毒入心經主清心明目除驚解煩驅邪逐痰及小兒驚癇天吊風熱諸證按竺黃之寒專瀉少陰之火火去而驚邪諸證靡不療矣産三竺國即竹節內黃粉然多有僞者須辨其片片如竹節者真金櫻子味酸澀性溫無毒入脾肺腎三經主脾泄下痢血崩帶下澀精氣止遺泄除咳嗽止小便助真氣潤顏色久服延年先去刺剖開去子復拭去毛用按丹溪曰金櫻子屬土而有金與水脾肺腎之入固其宜也又曰經絡隧道以通暢為和平味者取其澀性煎膏食之自作不靖咎將誰執此恐過服者傷脾百發也須九十月間半熟時採之太生令人利太熟功力薄訶梨勒味苦酸澀性溫無毒入肺肝脾腎大腸五經主冷氣心腹脹滿久瀉痢霍亂喘急腸風瀉血崩中帶下奔豚腎氣開胃消食生津止渴治嗽開音酒浸蒸熟用未熟時風飄墜者謂之隨風子肺因火傷郁退脹滿痰嗽咽喉不利者含三四枚殊勝按訶梨勒酸以瀉肝收肺苦以堅腎瀉脾澀以厚大腸五經之入所由來也終是酸澀之劑久瀉痢者宜之若積初而用之與丹溪痢無止法意相左矣衍義曰氣虛人亦宜緩緩煨熟少服雖能澀腸又能泄氣故也丹溪云訶梨勒紋只有六路或多或少此是毗梨勒罨梨勒榔精勒雜路勒並不宜用雷公云凡使勿用毗梨勒罨梨勒榔精勒雜路勒若訶梨紋只是六路或多或少並是雜路勒毗路勒個個毗雜路皆圓露又或八路至十三路號曰榔精勒多澀不入用凡修事先於酒內浸後蒸一伏時以刀削路細銼路乾用之郁李仁味酸性平無毒入大腸經主四肢浮腫腸中結氣關格不通膀胱急痛潤腸破血利水下氣消食寬中忌面及牛馬肉按郁李仁屬陰性主降故獨入大腸然宣泄太過能疏五臟真氣虛人不宜多用蕪荑味辛性溫無毒入肺脾二經主五內邪氣腸風痔漏疥癬風熱皮膚骨節間風濕除冷氣化宿食消疳積殺諸蟲去衣麵炒黃用按蕪荑辛宜於肺溫宜於脾故兩入之風寒濕脾大腸冷滑者此為要劑夫氣食皆因寒而滯諸蟲皆因濕而生得蕪荑以溫之燥之而證猶不痊者未之有也五加皮味辛苦性溫無毒入肺腎二經主心腹腰膝痛疝氣骨節拘攣多年瘀血在皮膚陰痿囊濕小兒腳軟女子陰癢陰蝕補勞傷堅節骨益志氣添精髓久服延年遠志為使畏蛇皮玄參按五加皮辛能瀉肺苦能堅腎宜併入之心腹等件何非兩經之證而有不治者耶昔張子聲楊廷如王叔牙於世彥等皆服五加皮酒不絶房室得壽三百歲有子二十人延年之說此其徵矣雷公云今五加皮其樹本是白秋樹其上有葉如蒲葉者其三葉花是雄五葉花是雌剝皮陰乾陽人使陰陰人使陽楮實味甘性平無毒入腎經主補虛勞壯陰痿助腰膝退水腫堅筋骨益氣力充肌膚悅顏色明耳目久服長生酒浸一宿蒸用樹汁塗癬及蠍螫樹皮主逐水利小便葉主小兒身熱煎湯洗惡瘡長肌肉莖主癮疹作癢單煮洗浴按楮實濁陰下降宜入少陰補益之功諸書具載獨修真祕旨曰服楮實者輒為骨軟疾必非無根之說然甚難解釋姑録之以待明敏雷公云凡使採得後用用水浸三日將物攪旋浮於水面者去之然後曬乾卻用酒浸一伏時了使蒸從巳至亥出焙令乾用秦皮味苦性寒無毒入肝腎二經主散風寒濕痹去肝中久熱兩目赤腫青白翳暈流淚不止及丈夫精衰女子崩帶小兒風熱驚癇大戟為使惡吳茱萸防葵按秦皮青碧之色宜入厥陰沉陰之品宜入少陰脾胃虛寒者不宜多用樗白皮味苦澀性寒無毒入心肝脾三經主月經過度帶漏崩中夢泄遺精腸風痔漏久痢脫肛縮小便除瘡疥祛鬼疰殺傳尸解蠱毒逐蛔蟲蜜炙用有一種椿皮功用相同性斂微溫按樗白皮血中之藥也心主血肝藏血脾裹血宜均入之孟詵云多食令人神昏血氣微密蒙花味甘性微寒無毒入肝經主青盲膚翳赤澀眵淚赤脈貫睛又主小兒麩痘及疳眼酒浸一宿蜜拌蒸曬乾用按密蒙專入肝經故治目之外無他長眼科之要劑也雷公云凡使先揀令淨用酒浸一宿漉出候乾用將蜜令潤蒸從卯至酉出日乾如此拌蒸三遍又卻日乾用每修事一兩用酒八兩浸待色變用蜜半兩蒸為度此元名木錦花辛夷味辛性溫無毒入肺胃二經主身體寒熱頭風腦痛面腫齒痛眩冒如在車船溫中氣利九竅解肌表通鼻塞除濁涕生鬚髮殺白蟲去麵點去毛及心用芎藭為使惡五靈脂畏菖蒲蒲黃黃連石膏黃環按辛夷辛溫發散太陰陽明之入固其宜也若肺胃虛熱不受風邪者勿得漫用雷公云凡使之去粗皮拭上赤肉毛了即以芭蕉水浸一宿漉出用漿水煮從巳至未出焙乾用若治眼目中患即一時去皮用向裡實者蕤仁味甘性溫無毒入心肝脾三經主心腹結氣結痰鼻中衄血眼疱上下風腫爛弦左右眥熱障胬肉清火止淚益水生光破核取仁去皮尖研用按心肝與脾皆血之臟而蕤仁入之夫目之有疾血之故也今得其甘以養血溫以和血而腫脹諸患從茲息矣雷公云凡使先用熱水浸去皮尖作兩片用芒硝木通甘草三味和蕤仁同水煮一伏時後漉出去諸藥取蕤仁研成膏加減入藥中使凡修事四兩用芒硝一兩木通甘草七兩女貞實味甘苦性平無毒入心肝二經主安五臟養精神補陰分益中氣黑鬚發強筋力去風濕除百病久服可延年冬採取布袋洗淨衣皮酒浸一宿曬乾用按女貞實苦走心甘走脾性用平和經冬不凋誠補陰之上劑也仙家亦需服食今罕有能用之者亦未究其藥爾五倍子味苦酸性平無毒入大腸經主齒宣疳䘌風癬疥癢腸風五痔及小兒面鼻口耳疳瘡明目生津止瀉澀精噙口中治口瘡善收頑痰解諸熱毒百藥煎即五倍造成主肺脹喘咳噙化能斂而降之按五倍酸苦之性專澀大腸其收斂甚捷瀉痢初起者未宜入劑牙皂味辛鹹性溫有小毒入肝胃二經主風痹死肌頭風目淚中風邪氣勞蟲等物通關竅理癰疽消脹滿化穀食除咳嗽療骨蒸去疥癬搐鼻噴嚏立至敷腫疼痛即除和生礬可吐風痰拌蜂蜜名為導箭水浸一宿去皮弦酥炙復去核及黃用柏實為使惡麥門冬畏空青人參苦參皂角刺主厲風鼻梁崩倒眉發自落又主癰疽其未潰者能發散其已潰者能引排膿藥直達膿處成功諸惡瘡癬咸不要缺按肝為風木之臟胃為水穀之腑牙皂辛溫有行散之功宜併入之多用能耗氣損血其刺乃質干之鋭者故於瘡癰無所不達若療厲風九蒸曝為妙巴豆味辛性生溫熟寒有大毒入脾胃大腸三經主消堅積蕩臟腑之沉寒通閉塞利水穀之道路排膿消腫破血通經殺鬼毒蠱疰及腹臟諸蠱去皮心膜油水煮五度用芫花為使惡蘘草畏大黃黃連藜蘆牽牛蘆筍醬豉冷水殺斑蝥蛇蠍毒按巴豆專主宣通則脾胃大腸宜其入已炒令紫黑可以通腸亦可止瀉蓋通因通用之意也仲景東垣及諸名家每每用之今世俗畏其辛熱之毒蕩滌之患輒云劫劑廢皆不用不知巴豆為斬關奪門之將其性猛烈投之不當為害非輕用之得宜奏功甚捷譬如張飛亦一虎將也顧人用之何如耳可概棄哉倘氣虛羸弱脾氣久傷者誠所大忌雷公云凡使巴豆之與豆及剛子須在仔細認勿誤用殺人巴顆小緊實色黃豆即顆有三稜色黑若剛子小似棗核兩頭尖巴與豆即用剛子勿使凡修事巴豆敲碎以麻油並酒等煮研膏後用每修事一兩以酒與麻油各七合盡為度金鈴子味苦性寒有小毒入心小腸二經主溫疾傷寒理大熱癲狂利小便通水道殺三蟲愈瘡瘍善除心痛宜作浴湯曬乾酒蒸去皮核用川蜀者佳按金鈴子苦寒宜入心家而小腸即其腑也故併入之瘡瘍諸證何非心火所致得金鈴以瀉之洵可愈矣紫葳味甘酸性微寒無毒入脾肝二經主婦人産後血崩不定血隔遊風崩中帶下癥瘕血閉安胎通淋又主熱風及身癢風疹二便不通酒渣熱毒畏滷咸一名凌霄花按紫葳甘歸脾臟酸走肝家二經乃藏血裹血者也故專調血證風癢之生亦營衛不和爾宜並理之丹溪曰治崩中血症之要藥也且補陰甚捷蓋有守而獨行者雷丸味苦鹹性寒有小毒入肺脾胃三經主胃中熱癲發狂走惡風汗出解蠱毒殺諸蟲逐皮裡膜外之水又作糜膏除小兒百病利丈夫不利女子久服陰痿火炮用荔實厚朴芫花為使惡葛根扁蓄赤者殺人按雷丸苦能燥脾而胃則其腑也肺則其子也故均入之蟲以濕熱為巢穴濕熱去而蟲可殺矣本經既云利丈夫別録又云久服陰痿於事相反陶隱居以此致疑不知利者疏利之謂爾非利益也雷公云凡使用甘草水浸一宿了將刀刮去黑皮破作四五片又用甘草湯浸一宿後蒸從巳至未日乾卻以酒拌如前日乾用之鉤藤味甘苦性微寒無毒入十二經主小兒寒熱諸種驚癇胎風客忤熱壅夜啼舒筋活血色黃而嫩鉤多者佳按鉤藤兼生氣血故於經絡靡所不入惟療小兒不入余方血竭味甘微咸性平有小毒入諸陰經主五臟邪氣心腹卒痛除帶下破積血療疥癬惡瘡及金瘡生肌止痛得密陀僧良有假者是海母血頗相似然味大咸有腥氣為辨爾敲斷有光彩磨指甲紅透者佳另研用若與別藥同搗化作飛塵按血竭專主血分故入諸陰之經日華子云諸瘡久不合者以敷此藥然不可多使卻能引膿茶茗味甘苦性微寒無毒入心肝脾肺腎五經主下氣醒睡除痰消瘡利便生津破熱氣清頭目善祛油膩解煎炙毒按茶茗清利之品故五臟鹹入然過食傷脾令人面黃消瘦其醒睡者亦以伐脾故耳阿魏味辛性微熱無毒入胃經主破症積下惡氣治霍亂止腹疼闢瘟禁瘧闢鬼祛邪能消蠱毒可滅傳尸按阿魏辛熱之性與胃腑相宜故獨入之産波斯國阿虞木內之脂也唐本云體性極臭而能止臭亦奇物也今市家多煎蒜白假充不可不辨真者置熱銅器中一日夜其沾阿魏處白如銀雷公云凡使多有訛僞共有三驗第一驗將半銖安於熱銅器中一宿至明沾阿魏處白如銀汞無赤色第二驗將一銖置於五方草自然汁中浸一夜至明如鮮血色第三驗將一銖安在樹上樹立干便是真凡使先於淨鉢中研如粉了於熱酒器上蒸過存入藥中用之乾漆味辛性溫有毒入胃大小腸三經主年深堅結之沉積日久祕結之瘀血殺三蟲絶傳尸損咳嗽止崩漏除九種心疼療風寒濕痹炒令煙盡用半夏為使畏雞子油脂鐵漿黃櫨汁蟹按乾漆專主行化胃與二腸宜其入已然攻堅消積之劑終損元神不宜過用中其毒者以所畏之物解之楓香味辛苦性平無毒入脾肝二經主辟惡氣治瘍毒止齒痛消風氣除下痢止霍亂退癮疹最捷一名白膠一名藝香按楓香辛宜走肺苦宜燥脾治節得宜倉廩得令則惡氣等證何患其不瘳蜀椒味辛性熱有毒入肺脾二經主冷氣咳逆心腹邪氣風寒濕痹癥瘕積聚霍亂轉筋留飲宿食開腠理通血脈堅齒髮調關節堪闢瘟疫可洗漆瘡微炒能出汗去黃谷用按蜀椒辛宜肺部熱宜脾家故併入之證屬寒凝誠為要劑然過於行散多服令人乏氣且發熱疾閉口者能殺人不可不慎雷公云一名南椒凡使須去目及閉口者不用其椒子先須酒拌令濕蒸從巳至午放冷又製法微炒出汗投器中舂之取紅皮去黃谷密收器中任用也
