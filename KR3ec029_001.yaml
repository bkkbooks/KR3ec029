body:
  text: 卷一金石部金銀箔味辛性平有毒入心肺二經主安心神定驚悸鎮癲狂除邪熱按金銀之入肺部固其類也其性沉重能制火臟之輕揚故亦入心經過服必中其毒以鷓鴣肉解之黃丹味辛性微寒有毒不載經絡主吐逆癲狂止痛生肌按黃丹乃熬鉛所作鉛本水中之金最能制火吐狂等證何者非火而有不瘳者乎胡粉味辛性寒無毒不載經絡主一切癰腫諸毒及腐爛肉殺三蟲破癥結按胡粉一名粉錫實亦化鉛所作能破結殺蟲者其亦鎮墜之功歟銅青味苦澀性平有微毒不載經絡主斂金瘡治眼暗止血殺蟲能去腐肉按銅青即銅緑本醋沃銅上而得其精華醋能收斂故斂瘡止血其去腐肉者亦醋之功眼乃肝竅眼之不明肝之病也得金之精以制木而目之暗者從此明矣鐵漿味甘澀性平無毒入心肺二經主癲癇狂亂解諸毒入腹蛇犬咬傷鎮心神明眼目堪洗膝瘡隨手而愈鐵鏽油調之可敷惡瘡瘡疥蒜磨敷蜘蛛咬傷按鐵漿即浸鐵色青可染皂者質本金也宜歸肺部性本沉也宜鎮心家明目治漆皆由伐木之功鐵鏽可敷瘡毒亦以發在外者有散之義歟水銀味辛性寒有毒不載經絡主疹瘻痂瘍白禿皮膚殺蟲蝨墜胎絶孕解金銀銅錫毒熔化還復為丹服之神仙不死畏磁石砒霜按水銀療蟲疹等證良由其毒也又殺五金毒者蓋以其性陰柔能消五金為泥耳入耳能食腦至盡入肉令百節攣縮倒陰絶陽性滑重極易入肉最宜謹之能下死胎可灌尸骸內傳極言其煉服之功然後世食之者往往喪生可為妄信者戒雷公云凡草中取者並朱漆中者俱不可用經別藥制過者勿用曾斂過死尸及半生半死者勿用若在硃砂中産出者其水銀色欲紅收得後用葫蘆盛之免致遺失若先以紫背天葵並夜交藤自然汁二味同煮一伏時其毒自退若修十兩止用煎二味汁各七鎰和合煮足為度輕粉味辛性寒有毒不載經絡主通大腸轉胞諸瘡蟲癬小兒疳積輕明可愛燒火上走者真按輕粉即水銀所升者本草言其無毒誤也外科需為要藥但勿輕用服食今見瘛瘲方中多用之必能損人腸胃不可不戒其值頗貴市中多燒凝水石及石膏為粉以亂真須細辨之銀硃味苦辛性溫有毒止入敷藥殺蟲余無他用按銀硃亦水銀燒就中其毒者令人發脹至死可弗慎耶密陀僧味鹹辛性平有毒不載經絡主皮膚斑點五痔金瘡嗽嘔吐痰禁瘧痢鎮心驚體重如金色者佳水飛用按密陀僧一名沒多僧質極重過服傷人臟雷公云凡使搗令細於磁鍋中安置了用重紙袋盛柳木末於密陀僧鍋中次下東流水浸令滿著火煮一伏時足去柳木紙袋取密陀僧用丹砂味甘生者微寒無毒煉者大熱有毒入心經主鎮心安神益氣明目通血脈除煩滿止消渴療百病殺精祟鬼邪祛疥瘡癬蟲久服成仙畏鹼水大如雞卵形似芙蓉破之若雲母光明照徹者佳按丹砂之色屬丙丁火心臟之所由歸也質性沉滯勿宜多用青霞子云入石見火悉成灰燼丹砂伏火化為黃銀能重能輕能神能靈能黑能白能暗能明太清云外包人石內含金精先稟氣於甲受氣於丙出胎見壬結魄成庚增光歸戊陰陽升降各本其原考茲二說則服食成仙之說信矣自唐世太平日久膏粱之家弗得其理惑於方士都致殞身習俗成風至今未已斯民何辜蒙此慘禍其理淵奧察之實難吾願好事者慎之雷公云凡使宜須細認取諸般尚有百等不可一一論之有妙硫砂如拳許大或重一鎰一塊者而面如鏡若遇陰氣天雨即鏡面上有紅漿汁出有梅柏砂如梅子許大夜有光生照見一室有白庭砂如菩提子許大上面有小星現有神座砂不經丹鱉服之則面白延年其次有白金砂澄水砂陰成砂辰錦砂芙蓉砂鏡面砂箭鏃砂曹未砂土砂金星砂平面砂神水砂不可一一細述之也凡修事硃砂先於一淨室內焚香齊沐然後取砂以香水浴拭乾即碎搗之後向鉢中更研三伏時即取一磁鍋子放了砂子用甘草紫背天葵五方草各銼之著砂上下以東流水煮亦三伏時勿令水盡關失時候約去三分次入青芝草山須草半兩蓋之下十斤火煅從巳至子時方歇候冷再研似粉如要服則入熬蜜丸如細麻子許大空腹服一丸如要入藥中用則依此法凡煅自然炭火五兩硃砂用甘草二兩紫背天葵一鎰五方草自然汁一鎰同東流水煮過鍾乳味甘性溫有毒入肺腎二經主泄精寒嗽壯元氣益陽事安五臟通百節利九竅下乳汁亦能通聲光潤輕鬆色如煉硝石者佳久研忌歇須用水飛以摻臂上入肉不見為度蛇床為使惡牡丹玄石牡蒙畏紫石英蓑草忌羊血按鍾乳性溫而狀有下行之義宜入腎經肺即其母也故併入之諸家本草述其功者甚衆惟丹溪以為剽悍之劑不宜輕用不煉而服使人病淋雷公云凡使勿用頭粗厚並尾大者為孔公石不是色黑及經大火燒過並久在地上收者曾經藥物制者並不得用須要鮮明薄而有光潤者似鷺翎管子為上有長五六寸者凡修事法以五香水煮過一伏時然後漉出又別用甘草紫背天葵汁漬再煮一伏時凡鍾乳八兩用沉香零陵香藿香甘松白茅各一兩以水先煮過一度了第三度方用甘草等三味各二兩再煮了漉出拭乾緩火焙之然後入臼杵如粉節過卻入鉢中令有力少壯者兩三人不住研三日夜勿歇然後用水飛淨了以絹籠之於日中曬令乾又入鉢中研二萬遍後以磁合收貯用之礬石味酸性寒無毒入肺肝二經主寒熱泄痢白沃陰蝕諸惡瘡癬清喉痹除目痛祛固熱禁泄瀉收脫肛同皂莢可吐風痰和蜜蠟能消癰腫光明如水晶者佳甘草為使惡牡蠣畏麻黃按礬石西方之色宜入肺家東方之味宜入肝部肺肝得令而寒熱諸證可無虞矣然亦收斂之劑弗宜驟用雷公云凡使須以磁瓶盛放火中煅令內外通赤用鉗揭起蓋旋安石蜂窠於赤瓶之中燒蜂窠盡為度將鉗夾出放冷敲碎入鉢中研如粉後於屋下掘一坑可深五寸卻以紙裹留坑中一宿取出再研每修事十兩用石蜂窠六兩燒盡為度又云凡使要光明如水晶酸鹹澀味全者研如粉干磁瓶中盛要盛得兩三升者然後以六一泥泥於火畔炙之令乾乃研了白礬於瓶內用五方草紫背天葵二味自然汁各一鎰旋旋添白礬於火中逼令藥汁干用蓋了瓶口復以泥泥上下用火一百斤煅從巳至未去火取白礬瓶出放冷敲碎取礬凡若經大火一煅色如銀自然伏火銖兩不失擂細研如輕粉方用之禹餘糧味甘性寒無毒不載經絡主咳逆寒熱煩滿崩中血閉癥瘕骨節疼痛四肢不仁大熱痔瘻牡丹杜仲為使畏貝母菖蒲鐵器按禹餘糧因禹行山中乏食採此充糧故以名之則其無毒可知矣太乙餘糧本是一種今諸家往往分別惟陳藏器所言者近是硝石味苦辛性大寒有毒入心脾二經主六腑積聚燥急留血閉藏天行疫痢傷寒發狂停痰作痞腸風痔漏推陳致新解諸石藥毒種種實熱悉可瀉除能墜胎服孕大黃為使惡苦參苦菜女菀畏麥句姜按硝石為太陰之精宜入心家瀉火而脾即其子也故併入之丹溪云本經言其無毒誤也能化七十二種石豈無毒而然乎分為六種氣味相同俱善消化驅逐但朴硝力緊芒硝馬牙硝力緩硝石風化硝玄明粉緩而又緩也以之治病病退即已本經稱其煉服補益豈理也耶經去熱淫於內治以鹹寒佐以苦寒古方因之故都用大黃佐芒硝耳雷公云凡使先研如粉以磁瓶子於五斤火中煅令通赤用雞腸菜柏子仁和作一處分丸餅子許大待餅子赤時投硝石於磁瓶內其硝石自然伏火每四兩硝石用雞腸菜柏子仁共十五個鉢子盡為度滑石味甘淡性寒無毒入胃膀胱二經主利水道實大腸化食毒行積滯逐凝血解燥渴導乳汁補脾胃降妄火白膩而無黃砂者佳甘草石葦為使曾曾青按滑石甘宜於中州淡宜於利水胃與膀胱之所由入也利益雖多終是走泄之劑無甘草以和之弗宜獨用也雷公云凡使有多般勿誤用之有白滑石緑滑石烏滑石冷滑石黃滑石其白滑石如方解石色白於石上書有白膩紋便是緑滑石性寒有毒不可入藥中用烏滑石似黑色書石上有青白膩紋入用妙也黃滑石似金顆顆圓書石上有青及黑色者勿用殺人冷滑石青蒼色書石上作白膩紋亦勿用若滑石色似水白青色書石有膩紋者真凡使先以刀刮研如粉以牡丹皮同煮一伏時出去牡丹皮取滑石卻用東流水淘過於日中曬乾方用石膏味辛甘性寒無毒入肺胃二經主出汗解肌緩脾益氣生津止渴清胃消痰最理頭疼與方解石相似須瑩淨如水晶者真雞子為使惡莽草馬目毒公巴豆畏鐵按石膏辛走肺甘走胃所以主發散仲景名為白虎蓋有兩義一則以入肺一則以其性雄苟胃弱不食及血虛發熱者誤用之為害不淺雷公云凡使勿用方解石此石雖白不透明其性燥若石膏出剡州若山縣義清山其色瑩潔如水晶性良善也凡使之先於石臼中搗成粉以密絹羅過生甘草水飛過去水令乾重研細用之良青鹽味鹹性寒無毒入腎經主明目止痛益氣堅筋骨助水臟除心腹痛破聚癬疥瘡一名戎鹽一名胡鹽按青鹽味鹹腎所宜也故獨入之水臟既補則明目堅骨等功何足異耶食鹽味鹹性溫無毒入腎肺肝三經主鬼蠱邪疰毒氣洗下部䘌瘡吐中焦痰癖尉疝氣及納腎氣止霍亂及心腹卒痛殺蟲去風明目固齒白如霜雪者佳炒研用按食鹽之咸本歸腎腑肺即其母肝即其子也故併入之本草云食傷筋損肺水腫及咳嗽血虛者忌之何也蓋以咸走腎過多則腎不能勝而受傷於是盜食母氣而肺氣亦損肺損則金還剋木夫肝主筋而藏血肺主咳嗽而生水數證之來寧能免耶雄黃味苦甘性平有毒不載經絡主殺精魅鬼邪蛇虺蠱毒山岡瘴毒惡瘡死肌疥癬蟲䘌百節中風鼻中息肉中惡腹痛佩帶之鬼神不敢近諸毒不能傷胎婦輔女成男解藜蘆毒大塊透明中無砂石者佳研細水飛用按雄黃或以為黃金之苗今有金窟處無雄黃則斯言未足深信夫孕婦佩之能轉女胎為男言若不經然里中試之者往往獲驗則有奪造化之功非稟太陽之精惡能臻此殺蠱辟邪宜其效矣中其毒者以防己解之雷公云凡使勿用黑雞黃自死黃夾膩黃其臭似雄黃只是臭不堪用時人以醋洗之三兩度便無臭氣勿誤用也次有夾膩黃亦似雄黃其內一重黃一重石不堪用次有黑雞黃亦似雄黃如烏雞頭上冠也凡使要似鷓鴣鳥肝色為上凡修事先以甘草紫背天葵地膽碧稜花四件並細銼每件各五兩雄黃三兩東流水入瓦鍋中煮三伏時方漉出搗如粉水飛澄去黑者曬乾再研方入藥用其內有劫鐵石又號赴矢黃能劫子鐵並不入藥用紫石英味甘辛性溫無毒入心經主咳逆邪氣寧心定驚補不足塗腫毒又主婦人子戶風寒十年無孕長石為使畏扁青附子惡黃連鮀甲麥句姜按紫石英為鎮重之劑又有紫赤色心經之所由入也心主血婦人得之則血受溫補而胎可結矣赤石脂味甘性平無毒入心經主養心氣明目益精療腹痛下痢癰疽瘡痔女子崩漏産難下胞衣惡大黃及松脂畏芫花按石脂色赤宜入心經腹痛諸證皆火為之殃崩漏諸證皆血為之禍心主血屬火得石脂以療之而更何庸虞哉寒水石味辛甘性大寒無毒入五臟諸經主內外大熱時行熱渴腹中積聚解巴豆毒凡使須薑汁煮之汁盡為度細研用畏地榆按寒水石即凝水石性極寒冷故於五臟靡所不入過服令人腸胃受寒不能飲食陶居云夏月能為冰者佳如此則舉世不能得矣似乎失言雷公云凡使先用生薑自然汁煮汁盡為度細研成粉然後用之每修十兩用薑汁一鎰花蕊石味性經絡諸書不載主金瘡止血産婦血暈火煅用按花蕊之功專主血證能化瘀血為黃水服之令人大虛不宜輕用若多用服後當以補劑培之陽起石味鹹性溫無毒入腎經主腎絶陰痿崩中漏下癥瘕結氣有云頭雨腳及鷺鷥毛者真桑螵蛸為使畏菟絲惡澤瀉官桂蛇蛻雷丸忌羊血按陽起石鹹溫之品宜歸水臟崩漏癥結皆腎虛所故咸療之難得其真勿宜誤用蓬砂味苦辛性溫無毒入肺經主消痰止嗽理喉痹破癥結光明瑩徹者佳按蓬砂色白味辛端入肺部痰嗽等證皆肺火也故咸治之膽礬味酸苦辛性寒有毒不載經絡主消熱殺蟲止驚癇吐風痰鮮明者佳按膽礬之功大抵與白礬相類惟能止驚為少瘥耳青礞石味辛甘性平有毒入肺大腸胃三經主蕩滌宿痰消磨食積研末細用按礞石辛宜於肺甘宜於胃大腸者肺家傳送之官也故都入之大損元氣不可漫用無名異味甘性平無毒不載經絡主金瘡折傷內損止痛生肌及長肉消癰疽腫毒按海內人云石無名異絶難得土無名異不甚貴重豈本經說者為石今所有者為土乎用時以醋磨塗患處玉屑味甘性平無毒入肺經主除煩止渴養神明目寧心定驚滅瘢痕滋毛髮助聲喉美顏色搗如米苦酒浸之消如泥惡鹿角畏款冬花按玉屑色白性潤宜入肺部肺得其養則煩渴諸證何自而生又主滅瘢云云者亦以肺主皮毛功效之所必及也自然銅味辛平無毒不載經絡主破積聚療折傷續筋骨散血排膿止痛定驚亦主産後血邪凡使須捶碎以甘草水煮過又用醋浸一宿以泥包裹之火煅研細用按自然銅實銅坑中所産之石也其色青黃如銅不從礦煉故名之丹溪曰自然銅世以為接骨要藥不知接骨在補氣補血補胃補腎俗醫惟冀速效以罔利而用之亦未稔其燥散之禍耳雷公云石髓鉛即自然銅也方使勿用方金牙其方金牙真似石髓鉛若誤餌吐殺人其石髓鉛色似干銀泥味微甘如採得先捶碎同甘草湯煮一伏時漉出令乾入臼中搗了重篩過以醋浸一宿至明用六一泥泥磁器中約盛得三升以來放文武火中養三日夜才幹便用蓋蓋了泥用火煅兩伏時去土研如粉用若修事五兩以醋兩鎰為度石燕性涼無毒味與經絡諸書不載主五淋小便不利腸風痔瘻婦人産難兩手各握一枚立驗研細水飛用按圖經云石燕出零稜郡今祁陽縣沙灘亦有之形似蚶而小其實石也觀其主治都是行下之功食療贊其補益似未然耳磁石味辛鹹性寒無毒入腎經主周身濕痹肢節中痛目昏耳聾補勞傷除煩躁消腫毒令人有子能吸重鐵者佳入火煅紅醋淬七次研絶細用柴胡為使惡牡丹芥草黃石脂按磁石入腎何也蓋以性能引鐵取其引肺金之氣入腎使子母相生爾水得金而清則相火不攻自去故主治如上然久服多服必有大患勿喜其功而忽其害也雷公云凡使勿誤用玄中石並中麻石此二石真相似磁石只是吸鐵不得中麻石心有赤皮粗是鐵山石也誤服之令人生惡瘡不可療磁石一片四面吸鐵一斤者此名延年沙四面吸得鐵八兩者號曰續採石四面吸得五兩上下者為磁石凡修事一斤用五花皮一鎰地榆一鎰故懸十五兩二件並細銼於石上捶碎作二三十塊半磁石入磁瓶中下草藥以東流水煮三日夜漉出拭乾以布裹之向大石上再捶令細入乳鉢中研極細如塵以水飛過又研如粉用之硫黃味酸性大熱有毒入命門經主下焦虛冷陽絶不起頭禿疽痔癬疥心腹痃癖腳膝冷疼虛損泄精瑩淨無夾石者良甘草湯煮過用畏朴硝細辛飛廉忌百般禽獸血按硫黃為火之精宜入命門補火蓋人有真火寄於右腎苟非此火則不能有生此火一熄則萬物無父非硫黃孰與補者太清云硫稟純陽號為將軍破邪歸正返濁還清挺立陽精消陰化魄戴元禮云熱藥皆燥惟硫黃不燥則先賢常頌之矣今人絶不用之誠虞其熱毒耳然有火衰之證余此莫療亦畏而遺之可乎中其毒者以豬肉鴨羹余甘子湯解之雷公云凡使勿用青赤色及半白半黃半赤半黑者自有黃色如雛雞初出殼者為真凡硫四兩先以龍尾蒿自然汁一鎰東流水三鎰紫背天葵汁一鎰粟逐子莖汁四鎰合之攪勻入瓦鍋用六一泥固濟底下將硫黃碎之入於鍋中以前件藥汁旋旋添入水煮之汁盡為度再以百部末十兩柳蟲末二斤一簇草二斤細銼之以東流水並藥等同煮硫黃二伏時去諸藥取出用甘草湯洗了入鉢中研二萬遍方妙果部陳皮味辛苦性溫無毒入肺肝脾胃四經主下氣消食化痰破結止嘔咳定霍亂療吐瀉利小便通五淋逐膀胱留熱殺寸白諸蟲核治腰痛疝痛葉治乳癰脅癰肉能止渴多食令人氣逆生痰去白者兼能除寒發表留白者兼能補胃和中微炒用産廣中陳久者良按陳皮辛苦之性能泄肺部金能制水故入肝家土不受侮故入脾胃採時性已極熱如人至老成則酷性漸減收藏又復陳久則多歷梅夏而烈氣全消溫中而無燥熱之患行氣而無峻削之虞中州之勝劑也乃大全以為多用獨用有損脾胃師心之過耳青皮味苦酸性溫無毒入肝脾二經主破滯氣愈用而愈效削堅積愈下而愈良引諸藥至厥陰之分下飲食入太陰之倉消溫瘧熱甚結母止左脅鬱怒作痛去肉微炒用按青皮即橘之小者酸能瀉水宜走肝經溫能輔導宜歸脾部其性峻削多服傷脾虛羸枳殼味辛苦酸性微寒無毒入肺肝胃大腸四經主下胸中至高之氣消心中痞塞之痰泄腹中滯塞之氣去胃中隔宿之食削腹內連年之積疏皮毛胸膈之病散風氣癢麻通大腸閉結止霍亂療腸風攻痔疾消水腫除風痛去瓤核麩炒用陳久者良按枳殼辛歸於肺酸歸於肝大腸者肺之腑也胃者上焦之腑也故均入之刮下枳茹其效更速雷公云凡使勿用枳實緣性效不同若使枳殼取辛苦酸並有油能消一切癖塊陳久年深者為上用時先去瓤麩炒過待麩焦黑取出用布拭去焦黑後再搗如粉用之枳實味苦酸性微寒無毒入心脾二經主消胸中之癖滿逐心下之停水化日久之稠痰削年深之堅積除腹脹消宿食定喘咳下氣逆麩炒用按枳實即枳殼之小者苦宜於心脾者心之子也故併入之其性猛烈有沖牆倒壁之功氣弱者忌之考青皮陳皮同一種枳殼枳實同一種但採有遲早分老嫩而名也四者主治咸以導滯為功然嫩者性酷治下老者性緩治高之別爾杏仁味甘苦性溫有小毒入肺大腸二經主胸中氣逆而喘嗽大腸氣祕而難便及喉痹喑啞痰結煩悶金瘡破傷風熱諸瘡中風諸證蛇傷犬咬陰戶痛癢並堪搗敷沸湯泡去皮尖炒用得火良惡黃芩黃耆葛根畏蘘草解錫毒及中狗肉毒雙仁者能殺人杏子不可多食能損筋骨眼目按杏仁入肺者經所謂肺苦氣上逆急食苦以瀉之是也大腸則共肺為傳送者也宜併入之考左慈祕訣稱杏仁為草金丹久服成仙方書又云服杏仁者往往至二三年或瀉或臍中出物皆不可治二說相背然杏仁主散痰從腠理中發散而去且有小毒則方書之說最為近理祕訣所言意者功在法制亦未可知然終屬虛渺勿宜盡信雷公云凡使須以沸湯浸少時去皮膜及尖擘作二片用白火石並烏豆杏仁三件於鍋中下東流水煮從巳至未其杏仁色褐黃勿用修治一斤用白火石一斤烏豆三合水旋添勿令間斷為妙也桃仁味苦甘性平無毒入肝大腸二經主瘀血血閉癥瘕鬼邪血燥便結殺三蟲止心痛沸湯泡去皮尖炒用花主殺鬼疰悅顏色利二便下諸蟲勿用千葉者令人鼻衄毛主血瘕積聚崩帶諸疾桃蟲主殺精鬼邪惡不祥葉主惡氣客忤陰戶生蟲痛癢及瘡中蟲桃實多食令人發熱按桃仁行血宜入肝經性潤宜入大腸典術云桃為五木之精故花仁子葉俱能壓邪殺鬼雷公云凡使須泡去皮尖用白朮烏豆二味和桃仁同於瓦鍋中煮一伏時後漉出用手擘作兩片其心黃如金色乃用之花勿用千葉者能使人鼻衄不止目黃凡用揀令淨以絹袋盛於檐下懸令乾用鬼髑髏勿使干桃子其鬼髑髏只是千葉桃花結子在樹上不落者於十一月內採得可為神妙凡修事以酒拌蒸從巳至未焙乾以銅刀切片焙取肉用大棗味甘性平無毒入心脾二經主和百藥益五臟潤心肺養脾胃補精氣生津液通九竅強筋骨祛邪氣悅顏色去核用殺烏豆毒忌生蔥按棗之入脾者經所謂五味入口甘先歸脾是也心則生脾者也宜併入之多服能壅脾作脹而中滿及齒痛風疾者咸非所宜烏梅味酸性溫無毒入肺腎二經主生津液解煩熱止吐逆陰瘧瘴止久痢消酒毒又主皮膚黑點痹不仁去核用按烏梅入肺者經所謂肺欲收急食酸以收之是也腎則其所生者也宜併入之多食最能損齒風寒初起瘧疾未久者不可驟以此收斂也藕味甘性平無毒入脾經主散瘀血止吐衄解熱毒消食止渴除煩解酒和蜜食之能肥腹臟不生諸蟲煮熟食之能實下焦大開胃脘其節尤佳其皮散血不凝蓮子主清心醒脾補中養神進飲食止瀉痢禁泄精除腰痛久服耳目聰明宜去心蒸熟用蓮鬚主益腎澀精荷葉主雷頭風破血止渴荷蒂主安胎逐瘀血留好血止血痢按藕味甘溫宜歸脾臟脾實裹血故治血證多服蓮子令人氣滯多服蓮鬚令人祕結荷葉形如仰盂其象為震震為雷屬木化風故治雷頭風枳朮丸用之取其引升少陽經清氣耳荷蒂在中故能中守又能行血者性溫之功也枇杷葉味苦性平無毒入肺經主除嘔和胃解渴止嗽下氣清痰刷去黃毛蜜炙用枇杷主潤五臟止吐解渴按枇杷葉入肺苦能泄氣故也不去黃毛射入肺中發咳不已枇杷多食亦能發熱生痰雷公云凡使採得後稱濕者葉重一兩乾者三葉重一兩者是氣足堪用使粗布拭上毛令盡用甘草湯洗一遍卻用綿再拭令乾每一兩以酥一分炙之以酥盡為度石榴皮味酸澀性溫無毒入大腸腎二經主精漏下痢筋骨風痛腳膝難行目流冷淚腸風下血殺牙蟲染鬚髮其子止渴其花百葉者主心熱療吐血為末吹鼻中止衄血及金瘡血按腸滑則患血痢腎滑則患遺泄榴者留也故入茲二經然痢積未盡者不可先以此澀之多服能變隔成痰其子不宜過食能損肺壞齒其花色赤屬火宜入心家而主血雷公云凡使皮葉根勿令犯鐵若使石榴殼不計乾溼先用漿浸一宿至明漉出其水如墨汁若使枝根葉並用漿水浸一宿方可用之山楂味甘酸性平無毒入脾經主健脾消食散結氣行滯血理瘡瘍按山楂之甘宜歸脾臟消食積而不傷於刻行氣血而不傷於蕩産科用之療兒枕疼小兒尤為要藥梨味甘性寒無毒入心肺二經主心經客熱肺臟煩熱止嗽消痰清喉降火解渴除煩消風潤燥按梨之入心經所謂以甘瀉之是也火清而金不受爍故亦入肺經性冷而利多食損脾丹溪曰梨者利也流利下行之謂也乳婦及金瘡忌用柿味甘澀性寒無毒入心肺大腸三經主潤心肺通耳鼻消痰嗽清火熱除渴解酒祛腸內宿血止口中吐血忌同蟹食柿干潤喉降火補虛殺蟲厚腸止痢柿蒂主厄逆按柿之色赤宜歸心臟性潤宜歸肺家大腸則共肺為傳送者也故亦入之性冷傷脾不宜多用若同蟹食令人腹痛大瀉柿干及蒂總屬寒涼都能清火芡實味甘性平無毒入心腎脾胃四經主安五臟補脾胃益精氣止遺泄暖腰膝去濕痹明耳目治健忘按芡實之甘宜歸脾胃土得其宜則水不受克火亦無盜食之虞故又入心腎二經多食壅氣最難消化嬰兒食之不長老人食之延年胡桃味甘性平無毒入肺肝腎三經主通血脈潤肌膚補下元同松脂可敷瘰癧同熱酒能理撲傷去衣用過食動風生痰按胡桃入肺故主肌膚入肝故主血脈其性屬火能補相火故亦入腎經火能剋金多食則傷肺故能動風生痰瀉痢及感冒風寒者忌用龍眼味甘性溫無毒入心脾二經主補血氣養肌肉益虛氣美顏色除健忘治怔忡增智慧明耳目久服延年按龍眼甘溫之品脾家所悅心者脾之母也母無顧子之憂則心血可保故入茲二經然甘能作脹凡中滿氣隔之證均宜遠之橄欖味甘澀性溫無毒入脾胃二經主開胃下氣消食化酒治渴止瀉解諸魚毒核中仁可塗口唇燥裂按橄欖甘溫之性宜職脾胃然性熱能致上壅亦不可多食谷部麥芽味甘鹹性溫無毒入脾胃二經主溫中下氣開胃健脾催生下胎去宿食除脹滿止吐逆破癥結消痰痞炒去芒再炒焦黃研用蜜為之使按麥芽甘而且溫宜職中州夫麥性泥滯不過水浸生芽氣雖少清性猶未化功效何若是殊哉全在多炒使其性枯爾不然是積食矣豈復能消耶丹溪云大麥有火能生熱病其芽能行上焦滯血除腹內寒鳴然多用久服令人消腎神麯味甘性溫無毒入脾胃二經主調中止瀉開胃消食破癥結逐積痰除脹滿又主胎上搶心血流不止亦能下鬼胎按神麯甘溫為脾胃所喜故兩入之本小麥面造成須得六神氣者良不爾與麵餅何異其法於六月六日用面五斤象白虎蒼耳草自然汁一碗象勾陳野藜自然汁一碗象螣蛇青蒿自然汁一碗象青龍杏仁去皮尖五兩及北方河水象玄武赤小豆煮熟去皮四兩象朱雀一如造麴法懸風處經年用雷公云凡使搗作末後掘地坑深二尺用物裹納坑中經宿取出焙乾用酒味苦甘性大熱有毒入十二經主驅邪氣闢穢惡御霧露解瘴癘溫脾胃破癥結助藥力厚腸胃駐顏色通行血脈榮養肌膚忌諸甜物及乳同食按酒之為用無微不達故諸經皆入之主療雖宏能發濕中之熱過飲則相火冒炎肺經受爍輒致痰嗽脾因火而困倦胃因火而嘔吐心因火而昏狂肝因火而善怒膽因火而忘懼膀胱因火而精枯甚者勞嗽吐衄哮喘蠱脹癲癇癰疽流禍不小尚或不節死亡立至可不謹乎醋味酸性溫無毒入肝經主胃脘氣痰癥瘕積聚産後血暈去瘀生新同胡粉止鼻中血同雄黃治蜂蠍蛇傷漬黃蘗可治口瘡磨南星可敷瘤癧調飛面堪塗癰腫和石灰除腋氣反蛤肉按經曰東方之木其味酸醋之所以端入肝也能傷筋損齒不宜多食飴糖味甘微溫無毒入肺脾二經主和脾潤肺補虛止渴消痰理嗽建中斂汗按肺喜潤脾喜甘宜飴糖之入二經也建中湯用之取其甘緩丹溪以為能生胃火此損齒之因非土製水乃濕土生火也中滿嘔吐及濕熱之證皆不宜服胡麻子味甘性平無毒入肺脾二經主傷中虛羸補五內益氣力潤肌膚填腦髓堅筋骨療金瘡止痛除瘡及傷寒溫瘧大吐後虛熱羸困利大小腸催生落胞久服耳目聰明辟穀延年水淘去浮者酒蒸曬乾去粗皮留薄皮按胡麻性潤而味甘脾肺之所由歸也仙經需為要藥取其補虛殊勝脾家有火大腸燥結者始為相宜不然恐有泄痢之患雷公云凡使有四件八稜者兩頭尖紫黑色者又呼胡麻並是誤也其巨勝有七稜色赤味澀酸是真又呼烏油麻作巨勝亦誤者修事一斤先以水淘浮去之沉者漉出令乾以酒拌蒸從巳至亥取出攤曬乾於臼中舂去粗皮一重拌小豆相對同炒小豆熟即出去小豆用之上有薄皮留用力在殼也白扁豆味甘性微溫無毒入脾經主補脾益氣和中止瀉醋製能療霍亂轉筋解酒毒及河魨毒一切草木毒葉主蛇蟲咬傷花主赤白帶下按扁豆性味皆與脾家相得宜獨入之然此劑最為泥膈惟入健脾藥中則能補脾若單食多食極能壅氣傷脾本草稱其下氣恐非赤小豆味甘酸性平無毒入心經主消熱毒排癰腫解煩熱補血脈止泄瀉下水氣利小便除大便血解小麥毒按赤小豆南方心火之色也故獨入之經曰諸瘡痛癢皆屬心火又曰心主血也故主療如上小腸者即受盛而與心應者故亦能利之衍義曰久服令人黑瘦結燥亦以利小便之故耳芝麻味甘性溫無毒入胃大小腸三經主行風氣通血脈滑腸胃潤肌膚生嚼可敷小兒頭瘡麻油主治相同能殺蟲治疥癬解百毒按芝麻味甘宜歸胃腑性滑利宜入大小腸總是潤澤之劑故能通血脈血脈通則風氣自行肌膚自潤矣乳母食之令兒無熱病不宜久食令人滑精消瘦發渴困脾有牙疼及脾胃疾者尤所當戒豆豉味苦性寒無毒入肺經主傷寒頭痛寒熱惡毒瘴氣煩躁滿悶虛勞喘吸按豉之入肺所謂肺苦氣上逆急食苦以泄之之意也傷寒瘴氣肺先受之喘吸煩悶亦肺氣有餘耳向弗治耶緑豆味甘性寒無毒入心胃二經主除熱毒厚腸胃散風消腫下氣補臟養神留皮用按緑豆寒則入心而瀉火甘則入胃而和中禹錫具稱其補益宜長食之又堪作枕能明目治頭痛
