body:
  text: 卷四草部下燈心味淡性寒無毒入心小腸二經主胸腹邪氣清心定驚除熱利水燒灰敷金瘡止血療小兒夜啼吹喉中治急喉痹甚捷按燈心味淡五臟無歸專入小腸利水訣曰小腸受盛與心應故又入心經燒灰性涼宜治療如上石斛味甘性平無毒入胃腎二經補虛羸暖水臟填精髓強筋骨平胃氣逐皮膚邪熱療腳膝冷痹久服厚腸胃定志除驚去根酒浸一宿曝乾酥炙用陸英為使惡寒水石巴豆畏殭蠶雷丸按石斛入腎則專主下部矣而又入胃者蓋以其味甘能助腎而不傷於熱平胃而不傷於燥之故也雷公云凡使先去頭上子用酒浸一宿漉出曬乾再用酥蒸從巳至酉卻徐徐焙乾然後用石葦味苦甘性平無毒入肺膀胱二經主勞熱邪氣五淋癃閉膀胱熱滿癰疽發背除煩下氣補虛益精拭去毛羊脂炒焦用絡石杏仁為使得菖蒲良按石葦清熱利水本入膀胱而肺則下連者也宜兼入之既能清熱利水則無陽亢陰傷之患白蒺藜子味苦辛性溫無毒入肺肝腎三經主惡血塊癥結喉痹産難乳閉小兒頭瘡皮膚風癢頭痛咳逆肺痿除煩下氣明眼目去燥熱療腫毒止遺泄其葉可作浴湯治風杵去刺酒蒸炒用烏頭為使沙苑蒺藜主補腎添精強陰種子按蒺藜利血宜入肝經下氣宜入肺經惡血等證皆二經病也故俱主之其所以入腎者因肺為之母肝為之子未有子母俱利而腎不受其益者故能止遺泄産沙苑者誠續嗣神丹而本草不言惜哉雷公云凡使採得後揀了淨蒸從午至酉出日曬乾舂令皮上刺盡用酒拌再蒸一二時用青葙子味苦性微寒無毒入心肝二經主邪氣皮膚風熱濕癢殺三蟲疥蟲惡瘡痔蝕下部䘌瘡鎮肝臟堅骨筋益腦髓明耳目一名草葶藶按青葙子苦者丙丁之味也青者甲乙之色也故入心肝二經本經並不言治眼而藥性論及日華子皆言之亦以苦寒之性能清肝臟熱毒上衝耳雷公云凡使勿誤用思蓂子並鼠黏子兩種頗相似只是味不同其思蓂子味粗煎之有涎木賊味甘微苦性平無毒入肺經主目疾退翳膜消積塊益肝臟得麝香牛角腮治休息痢久不瘥得禹餘糧當歸芎藭療崩中赤白得槐鵝桑耳治腸虛下血得槐子枳實地榆治腸澼及痔去節水潤焙用按木賊之名以其能伐木也肝為木故宜入焉夫目得血而能視借之以伐肝邪則血生而目疾愈矣茅根味甘性寒無毒入胃小腸二經逐瘀血通血閉止吐衄下五淋利小便理勞傷補虛羸除腸胃客熱治婦人崩漏按茅根利水本入小腸而胃則其實受故亦入之仙茅味辛性溫有毒入肝腎二經主心腹冷氣不能食腰足攣痹不能行丈夫血損勞傷老人失溺無子強陽道補精血明眼目堅骨髓洗淨去皮銅刀切如豆大生稀布袋盛於烏豆水中浸一宿酒拌蒸半日曬乾用勿犯鐵器忌牛肉牛乳按仙茅性溫本入腎經而肝者腎所生也故兼入之傳云十斤乳石不及一斤仙茅蓋表其功爾中其毒者令人舌脹急煎大黃朴硝湯飲之復以末摻舌間即解素有火證者勿用雷公云凡採得後用清水洗令淨刮去皮於槐砧上切豆許大卻用生稀布袋盛蒸一宿用鬱金味辛苦性溫無毒入心肺二經主下氣破血開鬱療尿血淋血金瘡楚産蟬肚者佳按鬱金本草言其性寒自藥性論始言其治冷氣今觀其主療都是辛散之用性寒而能之乎夫肺主氣心主血鬱金能行氣血故兩入之丹溪云屬火而有土與水古人用以治郁遏不散者故名薑黃味辛苦性溫無毒經絡主治與鬱金同功更烈按薑黃本草亦曰性寒而陳藏器及日華子咸謂其熱辨之悉矣能傷元氣用者審之牛蒡子味辛性溫無毒入十二經主風濕癮疹盈肌咽喉風熱不利諸腫瘡瘍之證腰膝凝滯之氣潤肺止嗽散氣消痰酒拌蒸待有白霜出拭去干焙搗用一名惡實一名鼠黏子按主治祕訣及東垣皆云牛蒡子辛溫故能入十二經而通散也潔古云吞一枚可出癰疽頭亦表其辛散之功爾本草言其性平誤矣紫草味苦性寒無毒入心小腸二經主心腹邪氣脹滿作痛癰腫諸毒除五疽利九竅通水道小兒無熱痘瘡尤為要劑取嫩茸去髭用按紫草主血熱本入心經而小腸者受盛而與心應者也故併入之邪氣諸證咸本於熱今清其心而自愈矣雷公云凡使須用蠟水蒸之待水乾取去頭並髭銼用每治紫草一斤用蠟二兩熔化用白頭翁味苦性溫有小毒入心腎二經主溫瘧發狂癥瘕積聚癭瘤瘰癧金瘡鼻衄齒痛腹痛骨痛赤毒痢下男子陰疝偏腫小兒頭禿膻腥豚實為使得酒良按白頭翁味苦本入心經經曰腎欲堅急入苦以堅之故又入腎溫瘧等證無非水衰火旺故治之白前味甘辛性微溫無毒入肺經主下氣除嗽氣寒厄上衝不得睡臥氣逆沖喉呼吸欲絶腹中時時作水雞聲甘草水浸一宿去頭鬚子焙乾用忌羊肉按白前色白味辛故入肺經專主一切氣證白薇味苦鹹性大寒無毒入心腎二經主暴中風身熱腹滿忽忽不知人狂惑鬼邪寒熱痠疼溫瘧洗洗髮作下水氣利陰氣定驚益精以糯米泔浸一宿去髭細銼蒸用惡黃耆大黃大戟乾薑大棗乾漆山萸按白薇味苦入心鹹入腎故主治如上白附子味甘辛性溫無毒入肺脾二經主中風失音一切冷風氣頭面百病斑點風瘡疥癬心痛血痹陰囊濕癢入藥炮用新羅出者佳按白附色白味辛故宜入肺以治風痰甘而且溫故宜入脾以治皮膚陽中之陽能上升故治面病蚤休味苦微寒有毒入心經主驚癇癲疾瘰癧陰蝕癰腫毒瘡小兒胎風手足抽掣下三蟲去蛇毒一名紫河車一名重樓金線按蚤休味苦故入心經以治驚癇等疾而能解毒白蘚皮味苦鹹性寒無毒入肺小腸二經主頭風黃疸咳逆淋瀝濕痹死肌一切疥癩惡風疥癬楊梅諸瘡熱毒天行時疾頭痛眼疼女子陰痛小兒驚癇和血脈通九竅利小腸惡螵蛸桔梗茯苓萆薢按白蘚皮入肺經故能去風入小腸故能去濕夫風濕既除則血氣自活而熱亦從此逝矣蘆薈味苦性寒無毒入心肝二經消風熱除煩悶明眼目治驚癇殺三蟲療五疳及疥癬痔漏諸瘡解巴豆毒按蘆薈之苦本入心經而肝則其母也故亦入之在小兒驚疳諸熱尤為要藥雷公云凡使勿用雜象膽其象膽幹了上有竹斑光膩和象葉搗此藥先搗成粉胡黃連味苦性寒無毒入肝膽胃三經主傷寒咳嗽溫瘧發熱骨蒸勞熱三消五痔補肝膽明眼目止瀉痢益顏色治小兒驚疳霍亂大人五心煩熱婦人胎蒸虛驚惡菊花玄參白蘚皮忌豬肉解巴豆毒折之出塵如煙者真按胡黃連苦寒能瀉三經之火小兒多熱證最宜澤蘭味苦性微溫無毒入小腸經通肝脾之血産前後百病皆治通九竅利關脈又主頭風目痛鼻紅吐血治癰排膿防己為之使按澤蘭能通利小腸則肝脾無壅閼之患故能通關竅以理血脈也行血而無推蕩之患養血而無膩滯之虞所以為産科聖藥凡癰瘡皆因血熱故亦治之雷公云要別識雌雄其形不同大澤蘭形葉皆圓能生血益氣與榮合小澤蘭通別同用狗脊味苦甘性微溫無毒入腎膀胱二經主腎氣虛弱風寒濕痹腰膝軟弱骨節作疼老人失滋不節女子傷中淋露酒蒸用萆薢為使惡敗醬按狗脊入腎故主骨病入膀胱故主濕病青蒿味苦性寒無毒入心經主骨蒸勞熱虛煩盜汗明目殺蟲童便浸七宿曬乾用按青蒿苦入心故瀉丙丁以理諸疾蓽茇味辛性大溫無毒入肺脾胃膀胱四經主溫中下氣消食開痰治陰疝止霍亂除瀉痢日久療心腹冷痛醋浸一宿刮去皮粟子令淨方用按蓽茇辛走肺家溫宜脾胃膀胱肺綰故鹹入之王不留行味苦甘性平無毒入心肝二經主金瘡止血癰疽毒瘡心煩鼻衄難産出竹木刺入兩治風毒通血脈酒蒸焙用按王不留行專療血證而心主血肝藏血者也故均入之癰疽等證血不和也經曰營氣不從逆於肉理乃生癰腫此主和血故宜治之又治風毒者所謂治風先治血血行風自滅也淫羊藿味辛性溫無毒入腎經主絶陽不起絶陰不育莖中作痛小便不利益氣力堅筋骨丈夫久服令人無子每斤去花細銼拌羊脂四兩炒盡脂為度山藥紫芝為使得酒良一名仙靈脾按仙靈脾入腎而主絶陽等證其為補也明甚乃繼之曰久服無子毋及惑乎不知此劑專助相火令人淫欲不休欲太甚則精氣耗經曰因而強力腎氣乃傷高骨乃壞且命門之火乘水之衰挾土來克生之不保其能嗣耶雷公云凡使仙靈脾須用夾刀去葉枝盡後細銼用羊脂相對拌炒過然後用巴戟天味辛甘性微溫無毒入脾腎二經主助腎添精除一切風及邪氣酒浸用覆盆為使惡雷丸丹參按巴戟之溫本專補腎而肺乃腎之母也且其味辛故兼入之以療風凡命門火旺以致泄精者忌之雷公云凡使先用枸杞子湯浸一宿待稍軟漉出酒浸一時又漉出用菊花同熬令焦黃用蘭葉味甘性寒無毒入肺經止渴生津益氣散郁按丹溪云蘭葉稟金水之精故入肺臟昔東垣方中嘗用之經謂消渴治之以蘭是也今屢驗之水萍味辛酸性寒無毒入肺小腸二經消水腫利小便逐風寒堪浴遍身瘡癢發汗甚於麻黃按水萍入肺故主祛風入小腸故主祛濕此是水中大萍非溝渠所生者高供奉採萍歌云不在山不在岸採我之時七月半選甚癱風與瘓風些小微風都不算豆淋酒下二三丸鐵袱頭兒都出汗以此觀之其功甚於麻黃可知矣決明子味鹹苦甘性平無毒入肝經主青盲赤白翳膜時有淚出除肝熱療頭風研末塗腫毒貼腦止鼻紅耆實為使惡大麻子按決明專入厥陰以除風熱故為眼科要藥鼻紅腫毒咸血熱也宜其療矣萆麻子味甘辛有小毒入脾大腸二經主水腹腹滿臟腑燥熱無名腫毒敷之可消口眼喎斜敷之可正塗足心下胞胎如神塗巔頂收生腸甚捷忌見鐵器服過者一生忌食豆誤犯之腹脹猛甚葉主腳氣風腫不仁搗蒸傳之按丹溪云萆麻子屬陰故入太陰陽明以驅水滿以催産難固矣而無名腫毒熱也口眼喎斜風也何並治之豈其辛甘發散之功耶雷公云凡使勿用黑天赤利子緣在地蔞上生是以有毒其萆麻子形似巴豆而光滑有黃黑斑點凡使先須和皮用鹽湯浸半日去皮取肉研過用馬鞭草味苦甘性寒有小毒入肝脾二經主活血通經治金瘡諸瘡癤取汁和酒服按肝藏血者也脾裹血者也馬鞭專主血分故入是二經蘆根味甘性寒無毒入肺胃二經主消渴客熱止小便利治五噎膈氣煩悶吐逆以蘆根五兩水三盞煮一盞服甚效按蘆根主氣逆嘔噦故入太陰陽明消渴之證亦以氣化不及故也今得蘆根以下太陰而津液之生必矣蛇床子味苦辛甘性平有小毒入肺腎二經主風寒濕痹諸惡瘡癬婦人陰中腫痛男子陰痿濕癢久服駐顏輕身令人有子酒浸一宿地黃汁拌蒸焙乾用惡牡丹皮巴豆貝母按蛇床理風濕宜入太陰補虛痿宜入少陰金銀花味苦甘性平微寒無毒入肺經主熱毒血痢消癰散毒補虛療風久服延年按金銀花解肌膚之毒故入肺經為瘡科要藥陶隱居云常服益壽人多忽之更求難得者是貴遠賤近庸人之情乎山豆根味甘性寒無毒入心肺二經主解諸藥毒止咽喉痛退熱消癰按山豆根性寒專瀉心火心火去則金無所損金得其保而熱傷之虞吾知免矣艾葉味苦性微溫無毒入肝脾二經主灸百病溫中理氣開鬱調經安胎種子止崩漏除久痢闢鬼邪定霍亂生搗汁理吐衄血按艾葉溫能令肝脾疏暢而無壅瘀之患夫人之一身惟茲氣血兩端今土木既調則營衛和而百病自卻矣至於濕中等效又舉其偏長耳煎服者宜新鮮灸火者宜陳久生用則寒熟用則熱薄荷味辛性微寒無毒入肺經主中風失音下脹氣去頭風通利關節破血止痢清風消腫引諸藥入營衛能發毒汗清利六陽之會首祛除諸熱之風邪按薄荷有走表之功宜職太陰之部中風諸患固其專也而血痢之證病在凝滯今得辛以暢氣而結凝為之自釋矣豨蘞味苦性溫有小毒入肝腎二經補元氣祛風濕強筋骨長眉發烏須鬢明耳目得酒良九月九日採者按豨蘞功驗如上宜職厥陰少陰二經高郵軍謂其性溫當矣本草言其性寒與主用相違不亦誤乎久服大能補益故張詠進御表云金稜銀線素根紫荄誰知至賤之中乃伏殊常之品臣服百劑耳目聰明漸服滿歲須髭再黑羅寧一墜馬中風不意十服即痊僧知嚴七十口眼喎斜數服頓愈若張益州者可謂識其用矣宜去根連莖葉細銼搗爛取汁熬煉成膏以甘草熟地煎膏煉蜜三味收之出火毒酒調服功妙不可具述所謂有小毒者以生用令人吐也今既經制度則毒去而功全矣蒲公英味苦甘性寒無毒入脾胃二經化熱毒消惡瘡結核解食毒散滯氣細銼同忍冬藤取汁入酒以治乳癰服罷欲睡是其功也睡覺病已安矣按丹溪云蒲公英花黃屬土宜入太陰陽明經有一種花葉莖相類而高大者非也其真者短小塌地質輕脆斷之有白汁其花干如蔥管空者是也四時常花花罷結實絮中有子落處則生則其稟天地中和之性可見矣故治諸毒又為黃花地丁者以治疔毒者名也夏枯草味苦辛性寒無毒入肝經主瘰癧癭瘤濕脾腳腫肝虛目痛冷淚羞明散血破症生肌解毒土瓜為使按夏枯草三四月開花是時正厥陰風木主令其為肝經之藥明矣丹溪曰夏至即枯者蓋稟純陽之氣得陰氣則枯也藿香味甘辛性微溫無毒入肺脾胃三經開胃口進飲食止霍亂除吐逆按藿香辛溫入肺經以調氣甘溫入脾胃以和中治節適宜中州得令則臟腑咸安病將奚來荊芥味辛苦性微溫無毒入肺肝二經主結氣瘀血酒傷食滯能發汗去皮毛諸風涼血熱療痛癢諸瘡其治産暈如神陳久者良按荊芥行血療風則太陰厥陰之入固其宜也今人但遇風證輒用荊防此流氣散之相沿爾不知風在皮裡膜外者荊芥主之非若防風之入骨肉也有汗者勿用香薷味辛性微溫無毒入肺胃二經主下氣除煩熱定霍亂止嘔吐療腹痛散水腫調中溫胃最解暑氣按香薷性溫其除熱解暑之功何若是其著也不知炎威酷暑則臟腑伏陰胸腹有凝結之憂而皮膚多蒸熱之氣得香薷之辛以散之溫以解之而傷暑之證從茲遠矣熱服令人泄瀉久服耗人真氣江右硬梗石生者良土香薷苗軟但能解暑其他無效佛耳草味酸性熱有小毒入肺經主肺中有寒及痰嗽勞嗽款冬花為使按佛耳專入太陰大升肺氣宜少用之過食損目以性熱有小毒也蒼耳子味甘性溫有小毒入肺經主風寒濕痹頭風腦漏疔腫困重疥癬搔癢血崩大風癲癇善能發汗炒令香杵去刺用反豬肉解狗毒按蒼耳甘溫故能走表肺主皮毛所以入之肺主風邪故治療如上茵陳蒿味苦性微寒無毒入膀胱經主傷寒大熱黃疸便赤治眼目行滯氣能發汗去風濕去根用犯火無功按茵陳專理溲便本為膀胱之劑又何以治疸蓋疸之為病脾受傷也而脾之所惡濕乘土也得茵陳以利水則濕去土安而疸自愈矣疸分陰寒陽熱二種陽疸熱多有濕有燥同梔子用一治濕疸同梔子橘皮治燥疸陰疸寒多只有一證同附子治之使君子味甘性溫無毒入脾胃二經治小兒五疳利小便止白濁除瀉痢殺諸蟲連殼用按使君子甘溫宜主脾胃然多食令人發厄傷胃故也高良薑味辛性大溫無毒入脾胃二經主胃中冷逆霍亂腹痛除寒氣去冷痹止吐瀉療翻胃消宿食解酒毒按良薑辛溫脾胃所快真有寒證者服之甚驗若有熱病者誤投愈劇石蓮子味苦性寒無毒入心胃膀胱三經主噤口痢及濕熱滲入膀胱為白濁淋瀝等證清心解煩開胃進食去殼用按石蓮苦寒宜瀉少陰之火心火既清則胃與膀胱不能獨熱矣故皆入之此別是一種非蓮子比也合歡皮味甘性平無毒入心經主安五臟利心志殺諸蟲消癰腫續筋骨令人歡樂無怒輕身明目花主小兒撮口煎湯洗拭跌打傷疼熱酒調下按合歡味甘何以獨入心家經所謂以甘瀉之之說也心得所勝而癰瘡諸患為之自釋矣其葉細細相併至夜則合又名夜合花似絨拂可愛俗又謂之烏絨萱草根味甘性寒無毒入脾肺二部經主砂淋水氣酒疸身黃小便赤澀身體煩熱大熱衄血安五臟利心志令人喜悅忘憂輕身明目採其嫩苗功亦相仿花名宜男最利胸膈孕婦佩之轉女為男按萱草之甘宜歸脾部而肺則其所生者故亦入之嵇康養生論云合歡蠲忿萱草忘憂圖經亦共言之當非虛語劉寄奴草味苦性溫無毒入心肺二經主下氣除症破血通經療霍亂水瀉止金瘡出血湯火所傷亦堪搗敷酒蒸曝用按寄奴之苦宜歸心臟而溫暖之性又與脾部相宜故兩入之蓋心實主血脾實裹血所以專療血證唐本云多服令人利亦以其宣泄耳雷公云採得後去莖葉只用實凡使先以布拭去薄殼皮令淨拌酒蒸從巳至申出曬乾用覆盆子味甘酸性溫無毒入肝腎二經主腎傷精滑陰痿不起小便頻數補虛續絶益氣溫中安和五臟補肝明目黑髮潤肌亦療中風發熱成驚女子食之多孕久服延年去黃葉及蒂水淘淨酒蒸曝乾用按覆盆之酸宜歸肝部而腎則其母也且溫補之性適與相宜故鹹入之衍義云小便多者服之當覆其溺器故名雷公云凡使用東流水淘淨子葉並皮蒂盡了用酒蒸一宿以東流水淘兩遍又曬乾方用
